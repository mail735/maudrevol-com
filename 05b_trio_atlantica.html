és, Lila Blanc — serão publicados ao longo dos lançamentos dos singles em 2026.", "vid_play": "Reproduzir vídeo", "vid_atlantica_cap": "Trio Atlantica — melodias franco-brasileiras, da Belle Époque à saudade.", "vid_manuit_cap": "Ma nuit chez Maud — duo intimista com Luke Darlison.", "vid_chega_cap": "Chega de saudade — releitura de Tom Jobim.", "vid_media1_cap": "Live & gravações.", "vid_media2_cap": "Live & gravações.", "proj_hero_label": "Projetos", "proj_hero_title": "Projetos", "proj_hero_subtitle": "Quatro formações, uma só voz.", "proj_cta": "Descobrir", "proj_5tet_title": "Maud Revol 5tet", "proj_5tet_tag": "Jazz fusion · Casa Verde", "proj_5tet_desc": "O quinteto principal, responsável pelo EP Casa Verde — jazz, MPB e chanson, entre o Mediterrâneo e o Atlântico.", "proj_atlantica_title": "Trio Atlantica", "proj_atlantica_tag": "Franco-brasileiro · Belle Époque", "proj_atlantica_desc": "Melodias francesas e brasileiras, do impressionismo à saudade carioca, em trio voz-guitarra-acordeão.", "proj_thelonious_title": "Thelonious Verse", "proj_thelonious_tag": "Vocalese · Thelonious Monk", "proj_thelonious_desc": "Um espetáculo musical sobre a obra de Thelonious Monk, em duo voz-piano com Maryline Ferrero.", "proj_vedettes_title": "Vedettes Quartet", "proj_vedettes_tag": "Em preparação", "proj_vedettes_desc": "Um novo projeto em criação. Mais informações em breve.", "sub_back": "← Todos os projetos", "p5_label": "Projeto", "p5_title": "Maud Revol 5tet", "p5_subtitle": "O projeto principal — o seu primeiro EP levado ao palco por um quinteto de alto nível.", "p5_text_1": "Não se encontra a própria casa à primeira tentativa. Depois de uma longa travessia entre jazz, bossa e chanson, Maud Revol constrói a sua — hoje chama-se Casa Verde. A virada chega no fim de 2019 com uma viagem ao Brasil: um mês e meio numa favela ao sul do Recife, numa casa de paredes verdes que a comunidade chamava de Casa Verde.", "p5_text_2": "Casa Verde, o seu primeiro EP lançado em 29 de maio de 2026, é fruto dessa travessia. Entre francês e português, entre o Mediterrâneo e o Atlântico, o projeto navega pelos mares do jazz, da MPB e da chanson. Apoiado pela Cidade de Marselha e produzido pela Éclosion 13, o Maud Revol 5tet está hoje a todo vapor.", "p5_members_title": "O quinteto", "atl_label": "Projeto", "atl_title": "Trio Atlantica", "atl_subtitle": "Conduzido pela cantora Maud Revol, o Trio Atlantica explora melodias francesas e brasileiras da Belle Époque ao pós-guerra.", "atl_text_1": "Ernesto Nazareth e Pixinguinha confraternizam com Fauré, enquanto Villa-Lobos dispara à frente com Ravel. A poesia de Baudelaire encontra a de Dora Vasconcellos: luxo, calma e volúpia abrem caminho até o coração pelos corredores do tempo.", "atl_text_2": "De um continente a outro há apenas um passo — dos voos impressionistas à saudade carioca, o trio puxa o fio perfumado de uma música sofisticada, mestiça, intimista, mas ancorada no ritmo e na dança.", "atl_text_3": "O cruzamento das estéticas eruditas e populares alimenta o discurso de uma formação de influências modernas: chanson, jazz, poesia e improvisação, a serviço de uma expressão autêntica.", "atl_members_title": "O trio", "thv_label": "Projeto", "thv_title": "Thelonious Verse", "thv_subtitle": "Um diálogo entre jazz e poesia em torno do universo de Thelonious Monk, em duo com a pianista Maryline Ferrero.", "thv_concept": "Thelonious Verse explora o fascinante universo de Thelonious Monk através de um diálogo entre jazz e poesia. Maud e Maryline reinventam a tradição do vocalese pondo palavras novas sobre as composições do lendário pianista, tecendo laços entre a personalidade de Monk, as mulheres que o cercaram e os seus próprios percursos.", "thv_demarche_label": "A abordagem", "thv_demarche": "Na linhagem do « Carmen Sings Monk » de Carmen McRae, o duo interpretou primeiro textos existentes, antes de tomar o tempo de encontrar as suas próprias palavras e explorar uma perspetiva contemporânea sobre esta obra maior. A música de Monk torna-se o pretexto de uma conversa íntima entre duas sensibilidades de hoje e o legado intemporal de um génio.", "thv_members_title": "O duo", "thv_photo_credit": "Créditos fotográficos: Laetitia Willmann · @tracesfurtives", "ved_label": "Projeto", "ved_title": "Vedettes Quartet", "ved_subtitle": "Um novo projeto — em preparação.", "ved_text": "O Vedettes Quartet está em criação. Mais informações muito em breve. Para qualquer pedido, escreva para contact[at]maudrevol.com.", "mem_maud_role": "Voz · composição · direção artística", "mem_maud_bio": "Formada em canto lírico e depois em jazz, marcada por uma estadia no Brasil; a partir de Marselha desenvolve uma escrita no cruzamento do jazz contemporâneo e das influências latinas.", "mem_jeremi_role": "Bateria", "mem_jeremi_bio": "Formado no conservatório Pierre Barbizet; tocou em palcos de jazz franceses (Baiser Salé, Sunset/Sunside) e europeus (Finlândia, Bélgica, Escócia).", "mem_yann_role": "Piano", "mem_yann_bio": "Nascido na Nova Caledónia, vencedor do prémio Sarah Waugh em Sydney; dupla formação clássica e jazz, recentemente selecionado pelo programa Trema.", "mem_willy_role": "Contrabaixo", "mem_willy_bio": "De origens guadalupense e siciliana; colaborou com a London Symphony Orchestra e diversos conjuntos de latin jazz e jazz flamenco.", "mem_luke_role": "Guitarra", "mem_luke_bio": "Guitarrista e compositor inglês radicado em Marselha, formado em Leeds e no conservatório Pierre Barbizet; quinze anos de experiência entre jazz e música clássica contemporânea.", "mem_wim_role": "Guitarra de sete cordas", "mem_wim_bio": "Guitarrista emérito e parceiro de longa data dos repertórios franco-brasileiros.", "mem_caroline_role": "Acordeão cromático", "mem_caroline_bio": "Acordeonista curiosa e versátil, também conhecida como Louise O'sman.", "mem_maryline_role": "Piano", "mem_maryline_bio": "Pianista-compositora marselhesa influenciada por Thelonious Monk, Horace Silver e Wynton Kelly. Compõe no LMN Trio e dedica-se à transmissão, explorando universos variados, do big band ao septeto de jazz dos anos 1920.", "biop_label": "Biografia", "biop_title": "Biografia", "biop_subtitle": "Narradora, autora e intérprete — eu canto as minhas histórias na boca de cena.", "biop_p1": "Embalada pelas cantoras de jazz que davam o ritmo às viagens de carro com a mãe — de Sarah Vaughan a Ella Fitzgerald —, é talvez a essa memória sonora que Maud deve o seu amor então inconsciente pela harmonia e pelas baladas belamente sinuosas. Sem se dar conta, pousa pela primeira vez a voz sobre as harmonias dos outros: imita primeiro, depois aprende os solos ouvindo-os dezenas de vezes, e decora melodias que já a fazem estremecer. A paixão e o dom para o canto nascem ali, nessas primeiras divagações pelo jazz cantado.", "biop_p2": "Um fascínio adolescente por Jeff Buckley e Björk, Michael Jackson e Stevie Wonder, um apetite pela black music… A paixão pela voz nunca está longe, ainda que o rock dos Blur ou o jazz-world a entusiasmem tanto quanto. O desejo de ir além da escuta está lá: Maud quer cantar.", "biop_p3": "Com experiência de coro desde a infância, afia as primeiras armas a solo no Jam de Montpellier. Em paralelo aos estudos universitários, forma-se em canto lírico no conservatório de Chambéry — Poulenc, Ravel, Fauré. Depois, um ano de voluntariado na Moldávia, onde o spleen cigano de Romica Puceanu e as romanças russas a comovem profundamente. Ali sobe ao palco em público pela primeira vez.", "biop_p4": "Recém-instalada em Marselha em 2013, trabalha alguns anos no setor associativo, mas uma certeza silenciosa cresce: o palco, em vez de uma secretária. Entre 2013 e 2018 monta dois duos, um trio e um quarteto que tocam nos pequenos palcos marselheses — bossa, standards e jazz instrumental. A criatividade transborda; a vontade de aprender ferve.", "biop_p5": "Após dois anos no IMFP de Salon-de-Provence, entra no conservatório Pierre Barbizet e monta o projeto Balacobaco, selecionado para um palco-trampolim do festival Marseille Jazz des Cinq Continents. Desejosa de aprofundar o conhecimento do Nordeste brasileiro e da língua portuguesa, parte três meses para o Brasil pouco antes da pandemia e torna-se amiga do guitarrista Thiago Righi. Uma viagem que a enche de matéria musical.", "biop_p6": "Com o diploma na mão em 2021, o campo dos possíveis ilumina-se: escrever, tocar, rodear-se. Fauré e Poulenc como obsessão persistente, surpreende-se a cifrar os seus acordes como standards e sonha em mesclá-los com o repertório brasileiro do início do século XX. Daí nasce o Atlantica, em trio ao lado de Wim Welker na guitarra e Caroline Guibeaud no acordeão.", "biop_p7": "Hoje, Maud habita plenamente o mundo sonoro que construiu. <em>Casa Verde</em>, o seu primeiro EP lançado a 29 de maio de 2026, ancora esta visão: um jazz intimista e solar, tecido entre as margens do Nordeste e a luz mediterrânea, que ela desdobra em palco com o seu quinteto.", "biop_quintet_label": "O quinteto", "biop_quintet_title": "Maud Revol 5tet", "biop_quintet_intro": "No palco, Maud rodeia-se de quatro músicos marselheses cujos percursos ricos misturam jazz, clássico e música do mundo.", "ct_label": "Contato", "ct_title": "Vamos escrever", "ct_intro": "Booking, imprensa, pedidos específicos — o caminho mais direto é o e-mail.", "ct_booking_label": "Booking & imprensa", "ct_booking_text": "Para programar um concerto ou receber o press kit, escreva diretamente. Resposta garantida.", "ct_newsletter_title": "A carta de Maud", "ct_newsletter_text": "Uma carta mensal, curta e pessoal: concertos, lançamentos e algumas palavras. Sem spam.", "mn_label": "Menções legais", "mn_title": "Menções legais", "mn_editor_label": "Editor do site", "mn_editor_intro": "Este site é editado no âmbito da atividade artística de Maud Revol, autora-compositora-intérprete, acompanhada e produzida pela associação Éclosion 13.", "mn_director_label": "Diretora da publicação", "mn_publication_label": "Produção & apoio", "mn_publication_text": "Maud Revol é acompanhada desde 2021 pela associação Éclosion 13 (gestão, produção, desenvolvimento) e apoiada pela Cidade de Marselha e pelo Departamento de Bouches-du-Rhône.", "mn_hosting_label": "Hospedagem", "mn_hosting_text": "Site hospedado numa infraestrutura web partilhada. Os dados do anfitrião serão indicados na publicação.", "mn_rights_label": "Direitos de autor", "mn_rights_text": "Maud Revol é filiada à SACEM e à ADAMI. Todos os textos, composições, fotografias e elementos gráficos deste site são protegidos. Qualquer reprodução está sujeita a autorização.", "mn_rgpd_label": "Dados pessoais (RGPD)", "mn_rgpd_text": "As informações recolhidas através do formulário de newsletter (nome, apelido, e-mail) servem unicamente para o envio da carta de informação. Não são cedidas nem vendidas. Em conformidade com o RGPD, tem direito de acesso, retificação e eliminação dos seus dados — escreva para contact[at]maudrevol.com ou utilize o link de cancelamento presente em cada envio.", "mn_credits_label": "Créditos", "mn_credits_text": "Fotografia: Baptiste Le Quiniou · Vídeo: Benjamin Rando · Fotos Thelonious Verse: Laetitia Willmann (@tracesfurtives).", "mn_designation_label": "Designação", "mn_designation_text": "Maud Revol — autora, compositora, intérprete.", "mus_intro_text": "Criadas entre as ondas do Nordeste e as do Mediterrâneo, quatro histórias intimistas e radiantes, inspiradas no jazz, nos ritmos latinos e na poesia brasileira", "mus_other_platforms": "também disponível em outras plataformas"}};
let currentLang = localStorage.getItem('mr_lang') || 'fr';
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('mr_lang', lang);
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (I18N[lang] && I18N[lang][k]) el.innerHTML = I18N[lang][k];
  });
  document.querySelectorAll('[data-i18n-attr-placeholder]').forEach(el => {
    const k = el.dataset.i18nAttrPlaceholder;
    if (I18N[lang] && I18N[lang][k]) el.setAttribute('placeholder', I18N[lang][k]);
  });
  document.querySelectorAll('.lang-picker button').forEach(b => {
    b.classList.toggle('active', b.dataset.langBtn === lang);
  });
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.lang-picker button').forEach(b => {
    b.addEventListener('click', () => applyLang(b.dataset.langBtn));
  });
  applyLang(currentLang);
  const header = document.getElementById('siteHeader');
  if (header) {
    const onScroll = () => header.classList.toggle('scrolled', window.scrollY > 80);
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
  }
  // parallax bg on home
  const bg = document.querySelector('.home-hero .bg-img');
  if (bg) {
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      if (y < window.innerHeight) bg.style.transform = `translateY(${y*0.3}px) scale(1.02)`;
    }, {passive:true});
  }
});

function closeModal(){document.getElementById('newsletterModal').classList.remove('open');}
