"vid_chega_cap": "Chega de saudade — eine Tom-Jobim-Interpretation.", "vid_media1_cap": "Live & Mitschnitte.", "vid_media2_cap": "Live & Mitschnitte.", "proj_hero_label": "Projekte", "proj_hero_title": "Projekte", "proj_hero_subtitle": "Vier Formationen, eine Stimme.", "proj_cta": "Entdecken", "proj_5tet_title": "Maud Revol 5tet", "proj_5tet_tag": "Jazz Fusion · Casa Verde", "proj_5tet_desc": "Das Aushängeschild-Quintett hinter der EP Casa Verde — Jazz, MPB und Chanson, zwischen Mittelmeer und Atlantik.", "proj_atlantica_title": "Trio Atlantica", "proj_atlantica_tag": "Französisch-brasilianisch · Belle Époque", "proj_atlantica_desc": "Französische und brasilianische Melodien, vom Impressionismus zur Rio-Saudade, im Trio Stimme-Gitarre-Akkordeon.", "proj_thelonious_title": "Thelonious Verse", "proj_thelonious_tag": "Vocalese · Thelonious Monk", "proj_thelonious_desc": "Ein Musikabend über das Werk von Thelonious Monk, im Duo Stimme-Klavier mit Maryline Ferrero.", "proj_vedettes_title": "Vedettes Quartet", "proj_vedettes_tag": "In Vorbereitung", "proj_vedettes_desc": "Ein neues Projekt in Entstehung. Mehr Informationen folgen bald.", "sub_back": "← Alle Projekte", "p5_label": "Projekt", "p5_title": "Maud Revol 5tet", "p5_subtitle": "Das zentrale Projekt — ihre Debüt-EP, auf die Bühne gebracht von einem erstklassigen Quintett.", "p5_text_1": "Man findet sein Zuhause nicht beim ersten Versuch. Nach einer langen Überfahrt durch Jazz, Bossa und Chanson baut Maud Revol ihres — heute heißt es Casa Verde. Der Wendepunkt kommt Ende 2019 mit einer Brasilien-Reise: anderthalb Monate in einer Favela südlich von Recife, in einem Haus mit grünen Wänden, das die Gemeinschaft die Casa Verde nannte.", "p5_text_2": "Casa Verde, ihre am 29. Mai 2026 erschienene Debüt-EP, ist die Frucht dieser Reise. Zwischen Französisch und Portugiesisch, zwischen Mittelmeer und Atlantik, navigiert das Projekt über die Meere von Jazz, MPB und Chanson. Unterstützt von der Stadt Marseille und produziert von Éclosion 13, ist das Maud Revol 5tet heute in vollem Schwung.", "p5_members_title": "Das Quintett", "atl_label": "Projekt", "atl_title": "Trio Atlantica", "atl_subtitle": "Angeführt von der Sängerin Maud Revol erkundet das Trio Atlantica französische und brasilianische Melodien von der Belle Époque bis in die Nachkriegszeit.", "atl_text_1": "Ernesto Nazareth und Pixinguinha machen mit Fauré gemeinsame Sache, während Villa-Lobos mit Ravel vorneweg prescht. Baudelaires Poesie begegnet jener von Dora Vasconcellos: Luxus, Ruhe und Wollust bahnen sich ihren Weg ins Herz durch die Korridore der Zeit.", "atl_text_2": "Von einem Kontinent zum anderen ist es nur ein Schritt — von impressionistischen Höhenflügen zur Rio-Saudade zieht das Trio den duftenden Faden einer Musik, die raffiniert, vermischt und intim ist, aber im Rhythmus und im Tanz verwurzelt bleibt.", "atl_text_3": "Die Verschränkung von Kunst- und Volksmusik nährt das Anliegen einer Formation mit modernen Einflüssen: Chanson, Jazz, Poesie und Improvisation im Dienst eines authentischen Ausdrucks.", "atl_members_title": "Das Trio", "thv_label": "Projekt", "thv_title": "Thelonious Verse", "thv_subtitle": "Ein Dialog zwischen Jazz und Poesie rund um die Welt von Thelonious Monk, im Duo mit der Pianistin Maryline Ferrero.", "thv_concept": "Thelonious Verse erkundet die faszinierende Welt von Thelonious Monk durch einen Dialog zwischen Jazz und Poesie. Maud und Maryline erfinden die Vocalese-Tradition neu, indem sie den Kompositionen des legendären Pianisten neue Worte unterlegen und Verbindungen knüpfen zwischen Monks Persönlichkeit, den Frauen um ihn herum und ihren eigenen Wegen.", "thv_demarche_label": "Der Ansatz", "thv_demarche": "In der Tradition von Carmen McRaes „Carmen Sings Monk“ interpretierte das Duo zunächst bestehende Texte, bevor es sich Zeit nahm, eigene Worte zu finden und eine zeitgenössische Perspektive auf dieses bedeutende Werk zu erkunden. Monks Musik wird zum Anlass eines intimen Gesprächs zwischen zwei heutigen Empfindsamkeiten und dem zeitlosen Erbe eines Genies.", "thv_members_title": "Das Duo", "thv_photo_credit": "Fotocredits: Laetitia Willmann · @tracesfurtives", "ved_label": "Projekt", "ved_title": "Vedettes Quartet", "ved_subtitle": "Ein neues Projekt — in Vorbereitung.", "ved_text": "Das Vedettes Quartet entsteht gerade. Mehr Informationen sehr bald. Für Anfragen schreiben Sie an contact[at]maudrevol.com.", "mem_maud_role": "Stimme · Komposition · künstlerische Leitung", "mem_maud_bio": "Ausgebildet im klassischen Gesang, dann im Jazz, geprägt von einem Brasilien-Aufenthalt; aus Marseille heraus entwickelt sie eine Schreibweise an der Schnittstelle von zeitgenössischem Jazz und lateinamerikanischen Einflüssen.", "mem_jeremi_role": "Schlagzeug", "mem_jeremi_bio": "Ausgebildet am Konservatorium Pierre Barbizet; er spielte auf französischen Jazzbühnen (Baiser Salé, Sunset/Sunside) und in Europa (Finnland, Belgien, Schottland).", "mem_yann_role": "Klavier", "mem_yann_bio": "Geboren in Neukaledonien, Preisträger des Sarah-Waugh-Preises in Sydney; doppelte Ausbildung in Klassik und Jazz, kürzlich vom Trema-Programm ausgewählt.", "mem_willy_role": "Kontrabass", "mem_willy_bio": "Mit guadeloupischen und sizilianischen Wurzeln; er arbeitete mit dem London Symphony Orchestra sowie verschiedenen Latin-Jazz- und Flamenco-Jazz-Ensembles.", "mem_luke_role": "Gitarre", "mem_luke_bio": "Englischer Gitarrist und Komponist mit Sitz in Marseille, ausgebildet in Leeds und am Konservatorium Pierre Barbizet; fünfzehn Jahre Erfahrung zwischen Jazz und zeitgenössischer Klassik.", "mem_wim_role": "Siebensaitige Gitarre", "mem_wim_bio": "Ein verdienter Gitarrist und langjähriger Weggefährte des französisch-brasilianischen Repertoires.", "mem_caroline_role": "Chromatisches Akkordeon", "mem_caroline_bio": "Eine neugierige und vielseitige Akkordeonistin, auch bekannt als Louise O'sman.", "mem_maryline_role": "Klavier", "mem_maryline_bio": "Marseiller Pianistin und Komponistin, beeinflusst von Thelonious Monk, Horace Silver und Wynton Kelly. Sie komponiert im LMN Trio und engagiert sich in der Vermittlung, von Big Band bis zum Jazz-Septett der 1920er.", "biop_label": "Biografie", "biop_title": "Biografie", "biop_subtitle": "Erzählerin, Autorin und Interpretin — ich singe meine Geschichten vorne, an der Rampe.", "biop_p1": "Gewiegt von den Jazzsängerinnen, die die Autofahrten mit ihrer Mutter rhythmisierten — von Sarah Vaughan bis Ella Fitzgerald — verdankt Maud dieser frühen Klangerinnerung wohl ihre damals unbewusste Liebe zur Harmonie und zu schön verschlungenen Balladen. Ohne es zu merken, legt sie ihre Stimme zum ersten Mal über die Harmonien anderer: erst imitiert sie, dann lernt sie die Soli, indem sie sie dutzende Male hört, und behält Melodien auswendig, die sie schon jetzt erschauern lassen. Leidenschaft und Begabung für den Gesang entstehen hier, in diesen ersten Streifzügen durch den gesungenen Jazz.", "biop_p2": "Ein jugendlicher Schwarm für Jeff Buckley und Björk, Michael Jackson und Stevie Wonder, eine Vorliebe für Black Music… Die Leidenschaft für die Stimme ist nie weit, auch wenn der Rock von Blur oder der World-Jazz sie ebenso begeistern. Der Wunsch, über das Zuhören hinauszugehen, ist da: Maud will singen.", "biop_p3": "Mit Chorerfahrung aus Kindheitstagen schärft sie ihre ersten solistischen Waffen beim Jam in Montpellier. Parallel zum Studium bildet sie sich am Konservatorium Chambéry im klassischen Gesang aus — Poulenc, Ravel, Fauré. Es folgt ein Freiwilligenjahr in Moldawien, wo sie der Weltschmerz von Romica Puceanu und russische Romanzen tief bewegen. Dort steht sie erstmals öffentlich auf der Bühne.", "biop_p4": "Frisch in Marseille angekommen (2013) arbeitet sie einige Jahre im Vereinswesen, doch eine leise Gewissheit wächst: die Bühne statt eines Schreibtischs. Zwischen 2013 und 2018 gründet sie zwei Duos, ein Trio und ein Quartett, die auf den kleinen Marseiller Bühnen spielen — Bossa, Standards, instrumentaler Jazz. Die Kreativität sprudelt, die Lust zu lernen brodelt.", "biop_p5": "Nach zwei Jahren am IMFP in Salon-de-Provence tritt sie ins Konservatorium Pierre Barbizet ein und gründet das Projekt Balacobaco, das für eine Nachwuchsbühne des Festivals Marseille Jazz des Cinq Continents ausgewählt wird. Aus dem Wunsch heraus, den brasilianischen Nordeste und die portugiesische Sprache besser kennenzulernen, reist sie kurz vor der Pandemie für drei Monate nach Brasilien und freundet sich mit dem Gitarristen Thiago Righi an. Eine Reise, die sie mit musikalischem Material erfüllt.", "biop_p6": "Mit dem Diplom in der Tasche (2021) öffnet sich das Feld der Möglichkeiten: schreiben, spielen, sich umgeben. Fauré und Poulenc als beharrliche Obsession ertappt sie sich dabei, ihre Akkorde wie Standards zu beziffern, und träumt davon, sie mit dem brasilianischen Repertoire des frühen 20. Jahrhunderts zu verweben. Daraus entsteht Atlantica, im Trio mit Wim Welker an der Gitarre und Caroline Guibeaud am Akkordeon.", "biop_p7": "Heute lebt Maud vollständig in der Klangwelt, die sie aufgebaut hat. <em>Casa Verde</em>, ihre Debüt-EP vom 29. Mai 2026, verankert diese Vision: ein intimer, sonnendurchfluteter Jazz, gewoben zwischen den Ufern des Nordeste und dem Mittelmeer-Licht, den sie auf der Bühne mit ihrem Quintett entfaltet.", "biop_quintet_label": "Das Quintett", "biop_quintet_title": "Maud Revol 5tet", "biop_quintet_intro": "Auf der Bühne umgibt sich Maud mit vier Marseiller Musikern, deren reiche Werdegänge Jazz, Klassik und Weltmusik verbinden.", "ct_label": "Kontakt", "ct_title": "Schreiben wir uns", "ct_intro": "Booking, Presse, konkrete Anfragen — der direkteste Weg ist die E-Mail.", "ct_booking_label": "Booking & Presse", "ct_booking_text": "Um ein Konzert zu programmieren oder das Pressedossier zu erhalten, schreiben Sie direkt. Antwort garantiert.", "ct_newsletter_title": "Mauds Brief", "ct_newsletter_text": "Ein kurzer, persönlicher Monatsbrief: Konzerte, Releases und ein paar Worte. Kein Spam.", "mn_label": "Impressum", "mn_title": "Impressum", "mn_editor_label": "Herausgeber der Website", "mn_editor_intro": "Diese Website wird im Rahmen der künstlerischen Tätigkeit von Maud Revol, Sängerin und Komponistin, herausgegeben, begleitet und produziert vom Verein Éclosion 13.", "mn_director_label": "Verantwortlich für die Veröffentlichung", "mn_publication_label": "Produktion & Förderung", "mn_publication_text": "Maud Revol wird seit 2021 vom Verein Éclosion 13 (Trägerschaft, Produktion, Entwicklung) sowie von der Stadt Marseille und dem Département Bouches-du-Rhône unterstützt.", "mn_hosting_label": "Hosting", "mn_hosting_text": "Die Website wird auf einer geteilten Web-Infrastruktur gehostet. Die Angaben zum Hoster werden bei der Veröffentlichung ergänzt.", "mn_rights_label": "Urheberrecht", "mn_rights_text": "Maud Revol ist Mitglied der SACEM und der ADAMI. Alle Texte, Kompositionen, Fotografien und grafischen Elemente dieser Website sind geschützt. Jede Vervielfältigung bedarf der Genehmigung.", "mn_rgpd_label": "Personenbezogene Daten (DSGVO)", "mn_rgpd_text": "Die über das Newsletter-Formular erhobenen Angaben (Vorname, Nachname, E-Mail) dienen ausschließlich dem Versand des Newsletters. Sie werden weder weitergegeben noch verkauft. Gemäß DSGVO haben Sie das Recht auf Auskunft, Berichtigung und Löschung Ihrer Daten — schreiben Sie an contact[at]maudrevol.com oder nutzen Sie den Abmeldelink in jeder Sendung.", "mn_credits_label": "Credits", "mn_credits_text": "Fotografie: Baptiste Le Quiniou · Video: Benjamin Rando · Fotos Thelonious Verse: Laetitia Willmann (@tracesfurtives).", "mn_designation_label": "Bezeichnung", "mn_designation_text": "Maud Revol — Sängerin, Komponistin, Texterin.", "mus_intro_text": "Entstanden zwischen den Wellen des Nordeste und des Mittelmeers — vier intime, sonnendurchflutete Geschichten, genährt von Jazz, Latin-Grooves und brasilianischer Poesie", "mus_other_platforms": "auch auf anderen Plattformen verfügbar"}, "pt": {"nav_home": "Início", "nav_music": "Música", "nav_video": "Vídeo", "nav_shows": "Shows", "nav_projets": "Projetos", "nav_bio": "Bio", "nav_contact": "Contato", "nav_newsletter": "Newsletter", "tagline": "Cantora · compositora · intérprete", "hero_ep_label": "PRIMEIRO EP", "hero_title": "Casa Verde", "hero_subtitle": "Uma voz do jazz que bebe da poesia do Brasil e do latin-jazz — sede de viver, melancolia agridoce.", "hero_release": "EP — 29 de maio de 2026", "hero_party": "Festa de lançamento — 3 de junho · Le Talus, Marselha", "hero_cta_listen": "Ouvir Malmousque", "hero_cta_support": "Apoiar o projeto", "news_label": "Em cartaz", "news_title": "Três coisas acontecendo", "news_ep_kicker": "O EP", "news_ep_title": "Casa Verde sai em 29 de maio de 2026", "news_ep_text": "Quatro faixas em francês e português — Malmousque, Casa Verde, Vanités, Lila Blanc. Mediterrâneo, Atlântico, jazz, MPB, chanson. Em todas as plataformas.", "news_ep_cta": "Descobrir a música", "news_party_kicker": "Festa de lançamento", "news_party_title": "3 de junho de 2026 · Le Talus, Marselha", "news_party_text": "Concerto de lançamento do EP com o quinteto completo. Uma noite festiva e íntima — Maud, Luke Darlison, Yann Delaunay, Willy Quiko, Jérémi Martinez.", "news_party_cta": "Reservar", "news_cf_kicker": "Crowdfunding", "news_cf_title": "Façam o show acontecer", "news_cf_text": "Para a festa de lançamento e a residência no Petit Duc em outubro de 2026. Contribuições a partir de € 5 — recibo fiscal pela Éclosion 13.", "news_cf_cta": "Participar", "bio_label": "Bio", "bio_title": "Narradora, autora, intérprete", "bio_subtitle": "Eu canto minhas histórias na boca de cena.", "bio_text": "Nascida em uma família de músicos clássicos, Maud teve seus primeiros arrepios musicais com os scats de Ella Fitzgerald e o piano de Tania Maria. Coro na infância, o Jam de Montpellier na adolescência, canto lírico em Chambéry, depois Marselha em 2013 — IMFP, conservatório, jazz. Uma estadia no Brasil no fim de 2019 marca sua escrita para sempre: Casa Verde, primeiro EP, é fruto dessa viagem. Hoje, compõe no cruzamento entre jazz, MPB e chanson — entre o Mediterrâneo e o Atlântico.", "bio_cta": "Ler a bio completa", "press_quote": "Maud Revol impõe-se como uma voz singular e profundamente sensível da cena musical contemporânea. A sua voz, ao mesmo tempo suave e habitada, navega entre a melancolia e a luz.", "press_attrib": "— Laura Gladin, Nouvelle Vague", "contact_label": "Contato", "contact_title": "Para programadores · para curiosos", "contact_text": "Booking, imprensa, pedidos específicos — escreva direto.", "contact_email_label": "E-mail", "contact_phone_label": "Telefone", "contact_socials_label": "Redes", "mus_hero_label": "Discografia", "mus_hero_title": "Música", "mus_hero_subtitle": "Um EP, singles, colaborações.", "mus_ep_label": "Primeiro EP", "mus_ep_title": "Casa Verde", "mus_ep_date": "29 de maio de 2026", "mus_ep_text": "Quatro faixas em francês e português — uma casa híbrida feita de groove, lirismo e sensualidade, no cruzamento entre chanson, jazz, bossa-nova e MPB.", "mus_ep_listen_spotify": "Ouvir no Spotify", "mus_ep_listen_apple": "Apple Music", "mus_track_01_title": "Malmousque", "mus_track_01_desc": "Valsa de jazz lírica e contemplativa — homenagem a uma pequena enseada da costa de Marselha. Um dia inteiro à beira-mar, em tableaux.", "mus_track_02_title": "Casa Verde", "mus_track_02_desc": "Faixa-título em três tableaux. Viagem ao Recife, novembro de 2019: alegria do transe, mal-estar de não pertencer, soltar.", "mus_track_03_title": "Vanités", "mus_track_03_desc": "Desilusão amorosa em milonga / tango argentino. “Não vou pagar, nem me esquecer para ser amada.”", "mus_track_04_title": "Lila Blanc", "mus_track_04_desc": "Poema sobre uma história de amor através da metáfora das estações. Inspirado em « Beau soir » de Debussy, estrutura bossa-nova.", "mus_singles_label": "Singles", "mus_singles_title": "Antes do EP", "mus_premiere_title": "Première Étoile", "mus_premiere_date": "Dezembro de 2023", "mus_premiere_desc": "Primeira faixa do novo quinteto — inaugurando o caminho que leva a Casa Verde.", "mus_fotografia_title": "Fotografia", "mus_fotografia_date": "Dezembro de 2023", "mus_fotografia_desc": "Cover de Tom Jobim — homenagem às raízes brasileiras do projeto.", "mus_collab_label": "Colaborações", "mus_collab_title": "Como convidada", "mus_collab_1_title": "Mister Emptiness", "mus_collab_1_desc": "Participação vocal em uma faixa de Mister Emptiness.", "mus_collab_2_title": "This Place — com Lola Stouthamer", "mus_collab_2_desc": "Dueto com Lola Stouthamer em This Place.", "shows_hero_label": "Concertos", "shows_hero_title": "Concertos", "shows_hero_subtitle": "Próximas e passadas.", "shows_upcoming": "Próximos", "shows_past": "Passados", "shows_ticket": "Ingresso", "shows_soldout": "Esgotado", "shows_info": "Info", "footer_contact": "Contato", "footer_email_text": "contact[at]maudrevol.com", "footer_phone_text": "+33 6 70 64 39 75", "footer_newsletter": "Newsletter", "footer_newsletter_text": "Carta mensal. Concertos, lançamentos, palavras de Maud.", "footer_newsletter_placeholder": "Seu e-mail", "footer_newsletter_btn": "Inscrever", "footer_follow": "Seguir", "footer_legal": "Menções legais", "footer_credits": "Fotos · Baptiste Le Quiniou", "footer_copy": "© 2026 Maud Revol · Todos os direitos reservados", "modal_title": "Assinar a newsletter", "modal_text": "Uma carta mensal curta e pessoal. Sem spam.", "modal_first": "Primeiro nome", "modal_last": "Sobrenome", "modal_email": "E-mail", "modal_consent": "Aceito a política de privacidade.", "modal_submit": "Inscrever", "vid_hero_label": "Vídeo", "vid_hero_title": "Vídeo", "vid_hero_subtitle": "Clipes, gravações e lives.", "vid_main_label": "Em destaque", "vid_media_label": "Mais vídeos", "vid_channel_cta": "Ver o canal do YouTube", "vid_soon_label": "Em breve", "vid_soon_text": "Os clipes do EP Casa Verde — Malmousque, Casa Verde, Vanités, Lila Blanc — serão publicados ao longo dos lançamentos dos singles em 2026.", "vid_play": "Reproduzir vídeo", "vid_atlantica_cap": "Trio Atlantica — melodias franco-brasileiras, da Belle Époque à saudade.", "vid_manuit_cap": "Ma nuit chez Maud — duo intimista com Luke Darlison.", "vid_chega_cap": "Chega de saudade — releitura de Tom Jobim.", "vid_media1_cap": "Live & gravações.", "vid_media2_cap": "Live & gravações.", "proj_hero_label": "Projetos", "proj_hero_title": "Projetos", "proj_hero_subtitle": "Quatro formações, uma só voz.", "proj_cta": "Descobrir", "proj_5tet_title": "Maud Revol 5tet", "proj_5tet_tag": "Jazz fusion · Casa Verde", "proj_5tet_desc": "O quinteto principal, responsável pelo EP Casa Verde — jazz, MPB e chanson, entre o Mediterrâneo e o Atlântico.", "proj_atlantica_title": "Trio Atlantica", "proj_atlantica_tag": "Franco-brasileiro · Belle Époque", "proj_atlantica_desc": "Melodias francesas e brasileiras, do impressionismo à saudade carioca, em trio voz-guitarra-acordeão.", "proj_thelonious_title": "Thelonious Verse", "proj_thelonious_tag": "Vocalese · Thelonious Monk", "proj_thelonious_desc": "Um espetáculo musical sobre a obra de Thelonious Monk, em duo voz-piano com Maryline Ferrero.", "proj_vedettes_title": "Vedettes Quartet", "proj_vedettes_tag": "Em preparação", "proj_vedettes_desc": "Um novo projeto em criação. Mais informações em breve.", "sub_back": "← Todos os projetos", "p5_label": "Projeto", "p5_title": "Maud Revol 5tet", "p5_subtitle": "O projeto principal — o seu primeiro EP levado ao palco por um quinteto de alto nível.", "p5_text_1": "Não se encontra a própria casa à primeira tentativa. Depois de uma longa travessia entre jazz, bossa e chanson, Maud Revol constrói a sua — hoje chama-se Casa Verde. A virada chega no fim de 2019 com uma viagem ao Brasil: um mês e meio numa favela ao sul do Recife, numa casa de paredes verdes que a comunidade chamava de Casa Verde.", "p5_text_2": "Casa Verde, o seu primeiro EP lançado em 29 de maio de 2026, é fruto dessa travessia. Entre francês e português, entre o Mediterrâneo e o Atlântico, o projeto navega pelos mares do jazz, da MPB e da chanson. Apoiado pela Cidade de Marselha e produzido pela Éclosion 13, o Maud Revol 5tet está hoje a todo vapor.", "p5_members_title": "O quinteto", "atl_label": "Projeto", "atl_title": "Trio Atlantica", "atl_subtitle": "Conduzido pela cantora Maud Revol, o Trio Atlantica explora melodias francesas e brasileiras da Belle Époque ao pós-guerra.", "atl_text_1": "Ernesto Nazareth e Pixinguinha confraternizam com Fauré, enquanto Villa-Lobos dispara à frente com Ravel. A poesia de Baudelaire encontra a de Dora Vasconcellos: luxo, calma e volúpia abrem caminho até o coração pelos corredores do tempo.", "atl_text_2": "De um continente a outro há apenas um passo — dos voos impressionistas à saudade carioca, o trio puxa o fio perfumado de uma música sofisticada, mestiça, intimista, mas ancorada no ritmo e na dança.", "atl_text_3": "O cruzamento das estéticas eruditas e populares alimenta o discurso de uma formação de influências modernas: chanson, jazz, poesia e improvisação, a serviço de uma expressão autêntica.", "atl_members_title": "O trio", "thv_label": "Projeto", "thv_title": "Thelonious Verse", "thv_subtitle": "Um diálogo entre jazz e poesia em torno do universo de Thelonious Monk, em duo com a pianista Maryline Ferrero.", "thv_concept": "Thelonious Verse explora o fascinante universo de Thelonious Monk através de um diálogo entre jazz e poesia. Maud e Maryline reinventam a tradição do vocalese pondo palavras novas sobre as composições do lendário pianista, tecendo laços entre a personalidade de Monk, as mulheres que o cercaram e os seus próprios percursos.", "thv_demarche_label": "A abordagem", "thv_demarche": "Na linhagem do « Carmen Sings Monk » de Carmen McRae, o duo interpretou primeiro textos existentes, antes de tomar o tempo de encontrar as suas próprias palavras e explorar uma perspetiva contemporânea sobre esta obra maior. A música de Monk torna-se o pretexto de uma conversa íntima entre duas sensibilidades de hoje e o legado intemporal de um génio.", "thv_members_title": "O duo", "thv_photo_credit": "Créditos fotográficos: Laetitia Willmann · @tracesfurtives", "ved_label": "Projeto", "ved_title": "Vedettes Quartet", "ved_subtitle": "Um novo projeto — em preparação.", "ved_text": "O Vedettes Quartet está em criação. Mais informações muito em breve. Para qualquer pedido, escreva para contact[at]maudrevol.com.", "mem_maud_role": "Voz · composição · direção artística", "mem_maud_bio": "Formada em canto lírico e depois em jazz, marcada por uma estadia no Brasil; a partir de Marselha desenvolve uma escrita no cruzamento do jazz contemporâneo e das influências latinas.", "mem_jeremi_role": "Bateria", "mem_jeremi_bio": "Formado no conservatório Pierre Barbizet; tocou em palcos de jazz franceses (Baiser Salé, Sunset/Sunside) e europeus (Finlândia, Bélgica, Escócia).", "mem_yann_role": "Piano", "mem_yann_bio": "Nascido na Nova Caledónia, vencedor do prémio Sarah Waugh em Sydney; dupla formação clássica e jazz, recentemente selecionado pelo programa Trema.", "mem_willy_role": "Contrabaixo", "mem_willy_bio": "De origens guadalupense e siciliana; colaborou com a London Symphony Orchestra e diversos conjuntos de latin jazz e jazz flamenco.", "mem_luke_role": "Guitarra", "mem_luke_bio": "Guitarrista e compositor inglês radicado em Marselha, formado em Leeds e no conservatório Pierre Barbizet; quinze anos de experiência entre jazz e música clássica contemporânea.", "mem_wim_role": "Guitarra de sete cordas", "mem_wim_bio": "Guitarrista emérito e parceiro de longa data dos repertórios franco-brasileiros.", "mem_caroline_role": "Acordeão cromático", "mem_caroline_bio": "Acordeonista curiosa e versátil, também conhecida como Louise O'sman.", "mem_maryline_role": "Piano", "mem_maryline_bio": "Pianista-compositora marselhesa influenciada por Thelonious Monk, Horace Silver e Wynton Kelly. Compõe no LMN Trio e dedica-se à transmissão, explorando universos variados, do big band ao septeto de jazz dos anos 1920.", "biop_label": "Biografia", "biop_title": "Biografia", "biop_subtitle": "Narradora, autora e intérprete — eu canto as minhas histórias na boca de cena.", "biop_p1": "Embalada pelas cantoras de jazz que davam o ritmo às viagens de carro com a mãe — de Sarah Vaughan a Ella Fitzgerald —, é talvez a essa memória sonora que Maud deve o seu amor então inconsciente pela harmonia e pelas baladas belamente sinuosas. Sem se dar conta, pousa pela primeira vez a voz sobre as harmonias dos outros: imita primeiro, depois aprende os solos ouvindo-os dezenas de vezes, e decora melodias que já a fazem estremecer. A paixão e o dom para o canto nascem ali, nessas primeiras divagações pelo jazz cantado.", "biop_p2": "Um fascínio adolescente por Jeff Buckley e Björk, Michael Jackson e Stevie Wonder, um apetite pela black music… A paixão pela voz nunca está longe, ainda que o rock dos Blur ou o jazz-world a entusiasmem tanto quanto. O desejo de ir além da escuta está lá: Maud quer cantar.", "biop_p3": "Com experiência de coro desde a infância, afia as primeiras armas a solo no Jam de Montpellier. Em paralelo aos estudos universitários, forma-se em canto lírico no conservatório de Chambéry — Poulenc, Ravel, Fauré. Depois, um ano de voluntariado na Moldávia, onde o spleen cigano de Romica Puceanu e as romanças russas a comovem profundamente. Ali sobe ao palco em público pela primeira vez.", "biop_p4": "Recém-instalada em Marselha em 2013, trabalha alguns anos no setor associativo, mas uma certeza silenciosa cresce: o palco, em vez de uma secretária. Entre 2013 e 2018 monta dois duos, um trio e um quarteto que tocam nos pequenos palcos marselheses — bossa, standards e jazz instrumental. A criatividade transborda; a vontade de aprender ferve.", "biop_p5": "Após dois anos no IMFP de Salon-de-Provence, entra no conservatório Pierre Barbizet e monta o projeto Balacobaco, selecionado para um palco-trampolim do festival Marseille Jazz des Cinq Continents. Desejosa de aprofundar o conhecimento do Nordeste brasileiro e da língua portuguesa, parte três meses para o Brasil pouco antes da pandemia e torna-se amiga do guitarrista Thiago Righi. Uma viagem que a enche de matéria musical.", "biop_p6": "Com o diploma na mão em 2021, o campo dos possíveis ilumina-se: escrever, tocar, rodear-se. Fauré e Poulenc como obsessão persistente, surpreende-se a cifrar os seus acordes como standards e sonha em mesclá-los com o repertório brasileiro do início do século XX. Daí nasce o Atlantica, em trio ao lado de Wim Welker na guitarra e Caroline Guibeaud no acordeão.", "biop_p7": "Hoje, Maud habita plenamente o mundo sonoro que construiu. <em>Casa Verde</em>, o seu primeiro EP lançado a 29 de maio de 2026, ancora esta visão: um jazz intimista e solar, tecido entre as margens do Nordeste e a luz mediterrânea, que ela desdobra em palco com o seu quinteto.", "biop_quintet_label": "O quinteto", "biop_quintet_title": "Maud Revol 5tet", "biop_quintet_intro": "No palco, Maud rodeia-se de quatro músicos marselheses cujos percursos ricos misturam jazz, clássico e música do mundo.", "ct_label": "Contato", "ct_title": "Vamos escrever", "ct_intro": "Booking, imprensa, pedidos específicos — o caminho mais direto é o e-mail.", "ct_booking_label": "Booking & imprensa", "ct_booking_text": "Para programar um concerto ou receber o press kit, escreva diretamente. Resposta garantida.", "ct_newsletter_title": "A carta de Maud", "ct_newsletter_text": "Uma carta mensal, curta e pessoal: concertos, lançamentos e algumas palavras. Sem spam.", "mn_label": "Menções legais", "mn_title": "Menções legais", "mn_editor_label": "Editor do site", "mn_editor_intro": "Este site é editado no âmbito da atividade artística de Maud Revol, autora-compositora-intérprete, acompanhada e produzida pela associação Éclosion 13.", "mn_director_label": "Diretora da publicação", "mn_publication_label": "Produção & apoio", "mn_publication_text": "Maud Revol é acompanhada desde 2021 pela associação Éclosion 13 (gestão, produção, desenvolvimento) e apoiada pela Cidade de Marselha e pelo Departamento de Bouches-du-Rhône.", "mn_hosting_label": "Hospedagem", "mn_hosting_text": "Site hospedado numa infraestrutura web partilhada. Os dados do anfitrião serão indicados na publicação.", "mn_rights_label": "Direitos de autor", "mn_rights_text": "Maud Revol é filiada à SACEM e à ADAMI. Todos os textos, composições, fotografias e elementos gráficos deste site são protegidos. Qualquer reprodução está sujeita a autorização.", "mn_rgpd_label": "Dados pessoais (RGPD)", "mn_rgpd_text": "As informações recolhidas através do formulário de newsletter (nome, apelido, e-mail) servem unicamente para o envio da carta de informação. Não são cedidas nem vendidas. Em conformidade com o RGPD, tem direito de acesso, retificação e eliminação dos seus dados — escreva para contact[at]maudrevol.com ou utilize o link de cancelamento presente em cada envio.", "mn_credits_label": "Créditos", "mn_credits_text": "Fotografia: Baptiste Le Quiniou · Vídeo: Benjamin Rando · Fotos Thelonious Verse: Laetitia Willmann (@tracesfurtives).", "mn_designation_label": "Designação", "mn_designation_text": "Maud Revol — autora, compositora, intérprete.", "mus_intro_text": "Criadas entre as ondas do Nordeste e as do Mediterrâneo, quatro histórias intimistas e radiantes, inspiradas no jazz, nos ritmos latinos e na poesia brasileira", "mus_other_platforms": "também disponível em outras plataformas"}};
let currentLang = localStorage.getItem('mr_lang') || 'fr';
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('mr_lang', lang);
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (I18N[lang] && I18N[lang][k]) el.innerHTML = I18N[lang][k];
  });
  document.querySelectorAll('[data-i18n-attr-placeholder]').forEach(el => {
    const k = el.dataset.i18nAttrPlaceholder;
    if (I18N[lang] && I18N[lang][k]) el.setAttribute('placeholder', I18N[lang][k]);
  });
  document.querySelectorAll('.lang-picker button').forEach(b => {
    b.classList.toggle('active', b.dataset.langBtn === lang);
  });
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.lang-picker button').forEach(b => {
    b.addEventListener('click', () => applyLang(b.dataset.langBtn));
  });
  applyLang(currentLang);
  const header = document.getElementById('siteHeader');
  if (header) {
    const onScroll = () => header.classList.toggle('scrolled', window.scrollY > 80);
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
  }
  // parallax bg on home
  const bg = document.querySelector('.home-hero .bg-img');
  if (bg) {
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      if (y < window.innerHeight) bg.style.transform = `translateY(${y*0.3}px) scale(1.02)`;
    }, {passive:true});
  }
});

function closeModal(){document.getElementById('newsletterModal').classList.remove('open');}
