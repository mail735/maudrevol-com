<style>
:root{
  --creme-fond:#F7F0E6;--creme-warm:#EDE4D5;--creme-light:#FBF7F0;
  --ink:#1A1A18;--ink-mid:#4A4A42;--ink-light:#7A7A72;
  --verde:#2D5016;--verde-bright:#6AA84F;--verde-pale:#D4E8C8;--verde-deep:#1F3810;
  --or:#E5AF68;--or-deep:#C8943A;
  --noir:#0D0B09;
  --font-mono:'JetBrains Mono','Courier New',monospace;
  --font-mono-alt:'Courier Prime','Courier New',monospace;
  --font-display:'Fraunces','Georgia',serif;
  --font-micro:'IBM Plex Mono','Courier New',monospace;
  --shadow-soft:0 4px 24px rgba(13,11,9,.08);
  --shadow-floating:0 18px 60px rgba(13,11,9,.32);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--creme-fond);color:var(--ink);font-family:var(--font-mono);font-size:15px;line-height:1.7;overflow-x:hidden}
img{max-width:100%;display:block;height:auto}
a{color:inherit;text-decoration:none}
.container{max-width:1280px;margin:0 auto;padding:0 32px}
.container-narrow{max-width:760px;margin:0 auto;padding:0 32px}
.label{font-family:var(--font-micro);font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-light)}
.stamp{display:inline-block;border:1.5px solid var(--verde);padding:.18rem .7rem;font-family:var(--font-mono-alt);font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--verde)}
.stamp-or{border-color:var(--or-deep);color:var(--or-deep)}
.stamp-rot{transform:rotate(-2deg);display:inline-block}
h1,h2,h3{font-family:var(--font-display);font-weight:500;line-height:1.04;color:var(--ink);letter-spacing:-.01em}
h1{font-size:clamp(3rem,8vw,6.5rem);font-style:italic;font-weight:400}
h2{font-size:clamp(2rem,4.6vw,3.6rem);font-style:italic;margin-bottom:1.5rem;font-weight:400}
h3{font-size:clamp(1.25rem,2.4vw,1.7rem);font-style:italic;margin-bottom:.8rem;font-weight:500}
p{margin-bottom:1rem}
.italic{font-style:italic;font-family:var(--font-display)}
.mono{font-family:var(--font-mono)}

/* Header */
.site-header{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:transparent;transition:background .35s ease,padding .3s ease,box-shadow .35s ease}
.site-header.scrolled{background:rgba(247,240,230,.97);box-shadow:0 1px 0 rgba(45,80,22,.08);padding:10px 32px}
.site-header .logo{display:flex;align-items:center;gap:14px}
.site-header .logo img{height:48px;width:auto;transition:filter .3s}
.site-header.on-dark:not(.scrolled) .logo img{filter:brightness(1.15)}
.site-header .logo-text{font-family:var(--font-mono-alt);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);opacity:.8;line-height:1.3}
.site-header.on-dark:not(.scrolled) .logo-text{color:var(--creme-light)}
.header-nav{display:flex;gap:24px;align-items:center}
.header-nav a{font-family:var(--font-micro);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-mid);transition:color .2s,border-color .2s;border-bottom:1px solid transparent;padding-bottom:3px}
.header-nav a:hover{color:var(--verde);border-bottom-color:var(--verde)}
.header-nav a.active{color:var(--verde);border-bottom-color:var(--verde)}
.site-header.on-dark:not(.scrolled) .header-nav a{color:rgba(247,240,230,.85)}
.site-header.on-dark:not(.scrolled) .header-nav a:hover,.site-header.on-dark:not(.scrolled) .header-nav a.active{color:var(--or);border-bottom-color:var(--or)}
.header-cta{display:flex;align-items:center;gap:14px}
.btn-newsletter{background:var(--verde-bright);color:var(--creme-light);font-family:var(--font-mono-alt);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:9px 18px;border-radius:999px;border:none;cursor:pointer;transition:background .2s,transform .15s;box-shadow:0 2px 0 var(--verde-deep)}
.btn-newsletter:hover{background:var(--verde);transform:translateY(-1px)}
.site-header.on-dark:not(.scrolled) .btn-newsletter{background:var(--or);color:var(--ink);box-shadow:0 2px 0 var(--or-deep)}
.lang-picker{display:flex;gap:0;font-family:var(--font-micro);font-size:.65rem;text-transform:uppercase;letter-spacing:.15em}
.lang-picker button{background:transparent;border:0;color:var(--ink-mid);padding:4px 7px;cursor:pointer;font:inherit;text-transform:inherit;letter-spacing:inherit;transition:color .2s}
.lang-picker button:hover{color:var(--verde)}
.lang-picker button.active{color:var(--verde);text-decoration:underline;text-underline-offset:4px}
.site-header.on-dark:not(.scrolled) .lang-picker button{color:rgba(247,240,230,.7)}
.site-header.on-dark:not(.scrolled) .lang-picker button.active{color:var(--or)}
@media (max-width:880px){.header-nav{display:none}.site-header{padding:10px 16px}.btn-newsletter{padding:8px 13px;font-size:.62rem}}

/* Buttons */
.btn{display:inline-block;font-family:var(--font-mono-alt);font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:14px 26px;border:2px solid var(--ink);color:var(--ink);background:transparent;cursor:pointer;transition:all .2s ease;border-radius:0}
.btn:hover{background:var(--ink);color:var(--creme-light)}
.btn-primary{background:var(--verde-bright);border-color:var(--verde-bright);color:var(--creme-light)}
.btn-primary:hover{background:var(--verde);border-color:var(--verde);color:var(--creme-light)}
.btn-or{background:var(--or);border-color:var(--or-deep);color:var(--ink)}
.btn-or:hover{background:var(--or-deep);color:var(--creme-light)}
.btn-ghost-light{border-color:var(--creme-light);color:var(--creme-light);background:transparent}
.btn-ghost-light:hover{background:var(--creme-light);color:var(--ink)}

/* Sections */
section{padding:96px 0;position:relative}
.section-label{font-family:var(--font-micro);font-size:.68rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--verde);margin-bottom:1rem;display:inline-block;border-bottom:1px solid var(--verde);padding-bottom:4px}
.section-creme{background:var(--creme-fond)}
.section-warm{background:var(--creme-warm)}

/* HERO Home */
.home-hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--noir);padding:140px 32px 80px}
.home-hero .bg-img{position:absolute;inset:0;background-size:cover;background-position:center 30%;will-change:transform;z-index:1}
.home-hero .bg-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,11,9,.45) 0%,rgba(13,11,9,.55) 50%,rgba(13,11,9,.75) 100%)}
.home-hero .grain{position:absolute;inset:0;opacity:.08;pointer-events:none;z-index:2;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E")}
.home-hero-inner{position:relative;z-index:5;display:grid;grid-template-columns:1fr 320px;gap:64px;align-items:center;max-width:1280px;margin:0 auto;width:100%}
.home-hero-text{color:var(--creme-light)}
.home-hero-text .stamp{border-color:var(--or);color:var(--or);margin-bottom:1.5rem}
.home-hero-text h1{color:var(--creme-light);text-shadow:0 4px 30px rgba(0,0,0,.4);margin-bottom:1.2rem}
.home-hero-text .subtitle{font-family:var(--font-display);font-style:italic;font-size:clamp(1.05rem,1.6vw,1.4rem);color:rgba(247,240,230,.92);max-width:540px;margin-bottom:1.8rem;line-height:1.5}
.home-hero-text .dates{display:flex;flex-direction:column;gap:.3rem;margin-bottom:2rem;font-family:var(--font-micro);font-size:.78rem;letter-spacing:.1em;color:var(--or)}
.home-hero-text .dates span::before{content:'·  ';color:var(--or)}
.home-hero-text .ctas{display:flex;gap:14px;flex-wrap:wrap}
.cover-floating{position:relative;justify-self:end;width:300px;height:300px;background:var(--creme-light);box-shadow:var(--shadow-floating);transform:rotate(-3deg);transition:transform .5s ease;border:1px solid rgba(229,175,104,.4)}
.cover-floating:hover{transform:rotate(-1deg) scale(1.03)}
.cover-floating img{width:100%;height:100%;object-fit:cover}
.cover-tag{position:absolute;top:-12px;right:-12px;background:var(--or);color:var(--ink);font-family:var(--font-mono-alt);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;transform:rotate(8deg)}
@media (max-width:880px){.home-hero-inner{grid-template-columns:1fr;gap:48px;text-align:left}.cover-floating{justify-self:start;width:240px;height:240px}}

/* News block (3 cards) */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:48px}
.news-card{background:var(--creme-light);padding:36px 30px;border-top:4px solid var(--verde-bright);position:relative;transition:transform .25s ease,box-shadow .25s ease;display:flex;flex-direction:column}
.news-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-soft)}
.news-card.featured{border-top-color:var(--or)}
.news-card .kicker{font-family:var(--font-micro);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--verde);margin-bottom:.8rem}
.news-card.featured .kicker{color:var(--or-deep)}
.news-card h3{font-size:1.4rem;line-height:1.15}
.news-card p{color:var(--ink-mid);font-size:.92rem;flex:1;margin-bottom:1.5rem}
.news-card a{font-family:var(--font-mono-alt);font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--verde);border-bottom:1px solid var(--verde);padding-bottom:3px;align-self:flex-start;transition:color .2s,border-color .2s}
.news-card a:hover{color:var(--or-deep);border-bottom-color:var(--or-deep)}
@media (max-width:880px){.news-grid{grid-template-columns:1fr}}

/* Section: bio teaser */
.bio-teaser{display:grid;grid-template-columns:5fr 7fr;gap:64px;align-items:center}
.bio-teaser .photo{position:relative}
.bio-teaser .photo img{width:100%;aspect-ratio:4/5;object-fit:cover}
.bio-teaser .photo::before{content:'';position:absolute;inset:24px -24px -24px 24px;border:2px solid var(--verde);z-index:-1}
.bio-teaser .text p{font-size:1.02rem;color:var(--ink-mid)}
@media (max-width:880px){.bio-teaser{grid-template-columns:1fr;gap:40px}}

/* Press quote */
.press-block{background:var(--verde-deep);color:var(--creme-light);padding:80px 32px;text-align:center}
.press-block blockquote{font-family:var(--font-display);font-style:italic;font-size:clamp(1.5rem,3.2vw,2.4rem);line-height:1.35;max-width:880px;margin:0 auto 1.5rem;color:var(--creme-light)}
.press-block .attrib{font-family:var(--font-micro);font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or)}

/* Contact teaser */
.contact-teaser{display:grid;grid-template-columns:1fr 1fr;gap:48px;background:var(--creme-warm);padding:80px 48px;border-left:6px solid var(--or)}
.contact-teaser h2{margin-bottom:.5rem}
.contact-teaser .text p{color:var(--ink-mid)}
.contact-teaser .info dl{display:grid;grid-template-columns:auto 1fr;gap:8px 24px;font-size:.95rem}
.contact-teaser .info dt{font-family:var(--font-micro);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--verde);padding-top:4px}
.contact-teaser .info dd{font-family:var(--font-mono);color:var(--ink)}
.contact-teaser .info dd a{border-bottom:1px solid var(--verde);transition:color .2s,border-color .2s}
.contact-teaser .info dd a:hover{color:var(--verde);border-bottom-color:var(--or)}
@media (max-width:880px){.contact-teaser{grid-template-columns:1fr;padding:48px 28px;gap:32px}}

/* Footer */
.site-footer{background:var(--verde-deep);color:var(--creme-light);padding:80px 32px 32px;font-family:var(--font-mono);font-size:.88rem}
.footer-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:48px;margin-bottom:48px;max-width:1280px;margin-left:auto;margin-right:auto}
.footer-col h4{font-family:var(--font-display);font-style:italic;font-size:1.4rem;color:var(--or);margin-bottom:1rem;font-weight:500}
.footer-col p{color:rgba(247,240,230,.85);margin-bottom:.8rem;font-size:.88rem}
.footer-col a{color:var(--creme-light);opacity:.88;transition:opacity .2s,color .2s;display:inline-block}
.footer-col a:hover{opacity:1;color:var(--or)}
.newsletter-form-mini{display:flex;gap:8px;margin-top:14px}
.newsletter-form-mini input{flex:1;background:rgba(247,240,230,.08);border:1px solid rgba(247,240,230,.2);color:var(--creme-light);padding:11px 12px;font-family:var(--font-micro);font-size:.78rem;border-radius:2px}
.newsletter-form-mini input::placeholder{color:rgba(247,240,230,.5)}
.newsletter-form-mini button{background:var(--or);color:var(--ink);border:0;padding:11px 16px;font-family:var(--font-mono-alt);font-weight:700;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s}
.newsletter-form-mini button:hover{background:var(--or-deep);color:var(--creme-light)}
.socials{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.socials a{font-family:var(--font-micro);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;border-bottom:1px solid var(--or);padding-bottom:2px;display:inline-block;color:var(--creme-light)}
.footer-bottom{border-top:1px solid rgba(247,240,230,.12);padding-top:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-family:var(--font-micro);font-size:.7rem;letter-spacing:.1em;color:rgba(247,240,230,.6);max-width:1280px;margin:0 auto}
.footer-bottom a{color:var(--or)}
@media (max-width:768px){.footer-grid{grid-template-columns:1fr;gap:32px}}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(13,11,9,.7);backdrop-filter:blur(6px);z-index:2000;display:none;align-items:center;justify-content:center;padding:24px}
.modal-backdrop.open{display:flex}
.modal{background:var(--creme-light);max-width:520px;width:100%;padding:42px 36px;position:relative;border-top:5px solid var(--verde-bright);box-shadow:var(--shadow-floating)}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:0;font-size:1.5rem;cursor:pointer;color:var(--ink-mid);line-height:1}
.modal h3{margin-bottom:.7rem}
.modal p{color:var(--ink-mid);margin-bottom:1.3rem;font-size:.92rem}
.modal-form{display:grid;gap:10px}
.modal-form input[type=text],.modal-form input[type=email]{font-family:var(--font-mono);font-size:.9rem;padding:11px 13px;border:1px solid var(--ink-light);background:var(--creme-fond);color:var(--ink)}
.modal-form input:focus{outline:none;border-color:var(--verde)}
.modal-form label.check{display:flex;gap:8px;align-items:flex-start;font-size:.75rem;color:var(--ink-mid);font-family:var(--font-micro)}
.modal-form button{margin-top:6px;background:var(--verde-bright);color:var(--creme-light);border:0;padding:13px;font-family:var(--font-mono-alt);font-weight:700;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s}
.modal-form button:hover{background:var(--verde)}

/* === MUSIQUE ===*/
.page-hero{padding:200px 32px 80px;background:var(--creme-warm);position:relative}
.page-hero .container{max-width:1100px}
.page-hero h1{font-size:clamp(3.5rem,8vw,6rem);margin-bottom:1rem;color:var(--ink)}
.page-hero .subtitle{font-family:var(--font-display);font-style:italic;font-size:1.4rem;color:var(--ink-mid);max-width:640px}

.ep-feature{display:grid;grid-template-columns:5fr 7fr;gap:64px;align-items:center}
.ep-feature .cover-wrap{position:relative}
.ep-feature .cover-wrap img{width:100%;aspect-ratio:1/1;object-fit:cover;box-shadow:var(--shadow-floating)}
.ep-feature .cover-wrap::before{content:'';position:absolute;inset:18px -18px -18px 18px;border:2px solid var(--or);z-index:-1}
.ep-feature h2{font-size:clamp(2.6rem,5vw,4.4rem)}
.ep-feature .meta{font-family:var(--font-micro);font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--verde);margin-bottom:1.2rem}
.ep-feature p{color:var(--ink-mid);font-size:1.02rem;margin-bottom:1.8rem}
.player-stack{display:flex;flex-direction:column;gap:14px;margin:1.5rem 0}
.player-line{display:flex;gap:14px;align-items:center;padding:14px 18px;background:var(--creme-light);border-left:3px solid var(--verde-bright);font-family:var(--font-mono-alt);font-size:.85rem}
.player-line .play-icon{width:26px;height:26px;background:var(--verde-bright);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--creme-light);font-size:.7rem}
.player-line.apple .play-icon{background:var(--ink)}
.player-line a{border-bottom:1px solid var(--ink-light);padding-bottom:1px}
@media (max-width:880px){.ep-feature{grid-template-columns:1fr;gap:40px}}

.tracklist{display:grid;grid-template-columns:repeat(2,1fr);gap:0;margin-top:64px;border-top:1px solid var(--ink-light)}
.track-card{display:grid;grid-template-columns:160px 1fr;gap:24px;padding:28px 0;border-bottom:1px solid var(--ink-light);align-items:center}
.track-card:nth-child(odd){border-right:1px solid var(--ink-light);padding-right:32px}
.track-card:nth-child(even){padding-left:32px}
.track-card img{width:160px;height:160px;object-fit:cover}
.track-card .meta{font-family:var(--font-micro);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--verde);margin-bottom:.4rem}
.track-card h3{font-size:1.4rem;margin-bottom:.6rem;font-style:italic}
.track-card p{font-size:.9rem;color:var(--ink-mid);line-height:1.55;margin:0}
@media (max-width:880px){.tracklist{grid-template-columns:1fr}.track-card:nth-child(odd){border-right:0;padding-right:0}.track-card:nth-child(even){padding-left:0}.track-card{grid-template-columns:96px 1fr;gap:18px}.track-card img{width:96px;height:96px}}

.singles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px;margin-top:40px}
.single-card{background:var(--creme-light);padding:32px;border-left:4px solid var(--or-deep)}
.single-card .meta{font-family:var(--font-micro);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--or-deep);margin-bottom:.6rem}
.single-card h3{font-size:1.6rem;margin-bottom:.4rem}
.single-card .date{font-family:var(--font-micro);font-size:.78rem;color:var(--ink-mid);margin-bottom:.8rem;letter-spacing:.06em}
.single-card p{color:var(--ink-mid);font-size:.92rem}
@media (max-width:880px){.singles-grid{grid-template-columns:1fr}}

/* === SHOWS ===*/
.shows-hero{padding:200px 32px 120px;background:var(--creme-warm);position:relative;overflow:hidden}
.shows-hero::before{content:'';position:absolute;right:-100px;top:-100px;width:500px;height:500px;background-image:var(--shows-bg);background-size:cover;background-position:center;opacity:.18;border-radius:50%;filter:grayscale(20%)}
.shows-hero .container{position:relative;z-index:2;max-width:1100px}

.shows-tabs{display:flex;gap:0;border-bottom:1px solid var(--ink-light);margin-bottom:48px}
.shows-tab{background:transparent;border:0;font-family:var(--font-mono-alt);font-size:.95rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mid);padding:18px 24px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;font-weight:700}
.shows-tab.active{color:var(--verde);border-bottom-color:var(--verde)}
.shows-tab:hover{color:var(--verde)}

.shows-list{display:flex;flex-direction:column}
.show-row{display:grid;grid-template-columns:170px 1.2fr 1.4fr 100px;gap:24px;padding:22px 0;border-bottom:1px solid rgba(45,80,22,.15);align-items:center;transition:background .2s}
.show-row:hover{background:rgba(212,232,200,.25)}
.show-row .date{font-family:var(--font-mono-alt);font-size:.95rem;color:var(--ink);letter-spacing:.04em}
.show-row .project{font-family:var(--font-display);font-style:italic;font-size:1.15rem;color:var(--ink)}
.show-row .venue{font-family:var(--font-mono);font-size:.88rem;color:var(--ink-mid)}
.show-row .venue strong{color:var(--ink);font-weight:400}
.show-row .action a{font-family:var(--font-mono-alt);font-size:.7rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--verde);border-bottom:1px solid var(--verde);padding-bottom:2px;transition:all .2s}
.show-row .action a:hover{color:var(--or-deep);border-bottom-color:var(--or-deep)}
.show-row.past .action a{color:var(--ink-light);border-bottom-color:var(--ink-light)}
.show-row.past{opacity:.7}
@media (max-width:880px){.show-row{grid-template-columns:1fr;gap:6px;padding:18px 0}.show-row .date{font-weight:700;color:var(--verde)}}

/* utility for hidden lang content */
[data-lang]{display:none}
[data-lang].lang-active{display:block}
[data-lang].lang-active-inline{display:inline}

/* ===================== WAVE 2 ===================== */
/* Video */
.video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px;margin-top:48px}
.video-card{background:var(--creme-light);overflow:hidden;box-shadow:var(--shadow-soft);display:flex;flex-direction:column}
.video-embed{position:relative;aspect-ratio:16/9;background:var(--noir);cursor:pointer;overflow:hidden}
.video-embed .thumb{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s ease}
.video-embed:hover .thumb{transform:scale(1.05)}
.video-embed .thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,11,9,.1),rgba(13,11,9,.45))}
.video-embed .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:66px;height:66px;border-radius:50%;background:rgba(229,175,104,.92);border:0;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:1.3rem;cursor:pointer;z-index:2;transition:background .2s,transform .2s;padding-left:4px}
.video-embed:hover .play-btn{background:var(--or);transform:translate(-50%,-50%) scale(1.08)}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:3}
.video-card .cap{padding:22px 24px}
.video-card .cap h3{font-size:1.25rem;margin-bottom:.35rem}
.video-card .cap p{font-size:.88rem;color:var(--ink-mid);margin:0}
.video-soon{margin-top:64px;background:var(--creme-warm);border-left:6px solid var(--or);padding:32px 36px}
.video-soon p{color:var(--ink-mid);margin:.5rem 0 0;max-width:680px}
@media(max-width:880px){.video-grid{grid-template-columns:1fr}}

/* Projets index */
.projets-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:36px;margin-top:48px}
.projet-card{display:flex;flex-direction:column;background:var(--creme-light);box-shadow:var(--shadow-soft);overflow:hidden;transition:transform .25s ease,box-shadow .25s ease}
.projet-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-floating)}
.projet-card .media{aspect-ratio:16/10;background-size:cover;background-position:center;background-color:var(--verde-deep)}
.projet-card .media.verde{background:linear-gradient(135deg,var(--verde-deep) 0%,var(--verde) 100%);display:flex;align-items:center;justify-content:center}
.projet-card .media.muted{background:linear-gradient(135deg,#2a2a26 0%,#4a4a42 100%);display:flex;align-items:center;justify-content:center}
.projet-card .media .ghost{font-family:var(--font-display);font-style:italic;font-size:1.9rem;color:rgba(247,240,230,.92);text-align:center;padding:0 1rem}
.projet-card .body{padding:28px 28px 32px;display:flex;flex-direction:column;flex:1}
.projet-card .tag{font-family:var(--font-micro);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--verde);margin-bottom:.6rem}
.projet-card h3{font-size:1.7rem;margin-bottom:.6rem}
.projet-card p{font-size:.92rem;color:var(--ink-mid);flex:1;margin-bottom:1.2rem}
.projet-card .go{font-family:var(--font-mono-alt);font-size:.76rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--verde);border-bottom:1px solid var(--verde);padding-bottom:3px;align-self:flex-start;transition:color .2s,border-color .2s}
.projet-card:hover .go{color:var(--or-deep);border-bottom-color:var(--or-deep)}
@media(max-width:880px){.projets-grid{grid-template-columns:1fr}}

/* Project sub-page hero */
.subpage-hero{position:relative;min-height:70vh;display:flex;align-items:flex-end;overflow:hidden;background:var(--noir);padding:170px 32px 64px}
.subpage-hero .bg-img{position:absolute;inset:0;background-size:cover;background-position:center 28%;z-index:1}
.subpage-hero .bg-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,11,9,.3) 0%,rgba(13,11,9,.55) 55%,rgba(13,11,9,.85) 100%)}
.subpage-hero.verde{background:var(--verde-deep)}
.subpage-hero.muted{background:linear-gradient(135deg,#23231f 0%,#45453d 100%)}
.subpage-hero-inner{position:relative;z-index:5;max-width:1100px;margin:0 auto;width:100%;color:var(--creme-light)}
.subpage-hero h1{color:var(--creme-light);text-shadow:0 4px 30px rgba(0,0,0,.45);margin-bottom:.8rem}
.subpage-hero .subtitle{font-family:var(--font-display);font-style:italic;font-size:clamp(1.1rem,2vw,1.65rem);color:rgba(247,240,230,.94);max-width:720px;line-height:1.45}
.subpage-hero .back-link{display:inline-block;font-family:var(--font-micro);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--or);margin-bottom:1.3rem;border-bottom:1px solid transparent;transition:border-color .2s}
.subpage-hero .back-link:hover{border-bottom-color:var(--or)}

/* Members */
.members-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:32px}
.member{padding:22px 24px;background:var(--creme-light);border-left:3px solid var(--verde-bright)}
.member .role{font-family:var(--font-micro);font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--verde);margin-bottom:.35rem}
.member .name{font-family:var(--font-display);font-style:italic;font-size:1.3rem;color:var(--ink);margin-bottom:.5rem}
.member p{font-size:.86rem;color:var(--ink-mid);margin:0;line-height:1.55}
@media(max-width:880px){.members-grid{grid-template-columns:1fr}}
.yt-block{margin-top:48px}
.yt-block .video-embed{max-width:900px;margin:0 auto;box-shadow:var(--shadow-floating)}

/* Bio page */
.bio-portrait-wrap{max-width:1100px;margin:0 auto}
.bio-portrait{width:100%;aspect-ratio:16/10;object-fit:cover;object-position:center 25%}
.bio-body p{font-size:1.05rem;color:var(--ink-mid)}
.bio-body p:first-of-type::first-letter{font-family:var(--font-display);font-style:italic;font-size:3.4rem;line-height:.8;float:left;padding:.08em .12em 0 0;color:var(--verde)}

/* Contact page */
.contact-hero{padding:200px 32px 90px;background:var(--creme-fond)}
.contact-hero .container{max-width:1100px}
.big-email{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:clamp(2rem,6.5vw,5.2rem);line-height:1.04;color:var(--verde-deep);word-break:break-word;margin:1.4rem 0 .5rem;display:inline-block;border-bottom:2px solid var(--or);transition:color .25s}
.big-email:hover{color:var(--verde-bright)}
.contact-cols{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:64px}
.contact-block h3{margin-bottom:.6rem}
.contact-block p{color:var(--ink-mid);font-size:.95rem}
.contact-block .lines{font-family:var(--font-mono);margin-top:.8rem}
.contact-block .lines a{border-bottom:1px solid var(--verde);transition:color .2s,border-color .2s}
.contact-block .lines a:hover{color:var(--verde);border-bottom-color:var(--or)}
.contact-socials a{font-family:var(--font-micro);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;margin-right:18px;border-bottom:1px solid var(--or);padding-bottom:2px;display:inline-block;margin-bottom:6px}
@media(max-width:880px){.contact-cols{grid-template-columns:1fr;gap:32px}}

/* Mentions / legal */
.legal{padding:190px 32px 80px;background:var(--creme-light)}
.legal .container{max-width:820px}
.legal h1{margin-bottom:2rem}
.legal .block{margin-bottom:2rem}
.legal h2{font-size:1.45rem;margin-bottom:.6rem}
.legal p{color:var(--ink-mid);font-size:.95rem}
.legal .org-card{background:var(--creme-warm);padding:24px 28px;border-left:4px solid var(--verde);font-family:var(--font-mono);font-size:.88rem;line-height:1.85;margin:1rem 0}
.legal .org-card .k{color:var(--verde);font-family:var(--font-micro);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;margin-right:.4rem}

/* ===================== WAVE 4-6 (12.06.2026) ===================== */
/* Spotify / Apple Music Embeds */
.embed-stack{display:flex;flex-direction:column;gap:14px;margin-top:1.4rem}
.embed-stack iframe{width:100%;border:0;border-radius:12px;display:block;background:transparent}

/* Presse / médias (Musique) */
.press-media{display:grid;grid-template-columns:minmax(0,420px) 1fr;gap:44px;margin-top:48px;align-items:start}
.press-media .press-img{display:block;box-shadow:var(--shadow-floating);transition:transform .25s ease}
.press-media .press-img:hover{transform:translateY(-4px)}
.press-media .press-img img{width:100%;display:block}
.press-media blockquote{font-family:var(--font-display);font-style:italic;font-size:1.35rem;line-height:1.5;color:var(--verde-deep);margin:0 0 1rem}
.press-media .attrib{font-family:var(--font-mono);font-size:.88rem;color:var(--ink-mid);margin-bottom:1.6rem}
@media(max-width:880px){.press-media{grid-template-columns:1fr;gap:28px}}

/* Contact-Teaser: Grid-Blowout-Fix (lange E-Mail/Telefon-Zeilen sprengten die 1fr-Spur,
   Text lief rechts aus dem Panel — gemeldet iPhone 13 mini, 12.06.) */
.contact-teaser > *{min-width:0}
.contact-teaser .info dd{overflow-wrap:anywhere}
.contact-teaser .text h2{overflow-wrap:break-word}
@media(max-width:880px){
  .contact-teaser{padding:40px 22px}
  .contact-teaser h2{font-size:clamp(1.8rem,7.5vw,2.6rem)}
  .contact-teaser .info dl{grid-template-columns:1fr;gap:2px 0}
  .contact-teaser .info dt{padding-top:14px}
}

/* iOS / Mobile: Header-Fix + Bottom-Tab-Navigation (Maud Welle 6) */
.header-cta{position:relative;z-index:5}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:1200;background:rgba(247,240,230,.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 -1px 0 rgba(45,80,22,.16);overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom)}
.mobile-nav a{flex:1 0 auto;text-align:center;padding:13px 13px;font-family:var(--font-micro);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mid);white-space:nowrap;border-top:2px solid transparent}
.mobile-nav a.active{color:var(--verde);border-top-color:var(--verde);font-weight:700}
@media(max-width:880px){
  .mobile-nav{display:flex}
  body{padding-bottom:calc(46px + env(safe-area-inset-bottom))}
  .site-header .logo-text{display:none}
  .site-header{padding:10px 12px}
  .site-header.scrolled{padding:8px 12px}
  .site-header .logo img{height:40px}
  .header-cta{gap:6px}
  .lang-picker button{padding:6px 7px;font-size:.72rem}
  .site-header .btn-newsletter{display:none}
  .contact-hero{padding:150px 20px 70px}
  .big-email{font-size:clamp(1.4rem,7.5vw,2.6rem)}
  .contact-cols{margin-top:40px}
}
</style>

n 2019 imprime durablement son écriture : Casa Verde, premier EP, en est le fruit. Aujourd'hui, elle compose à la croisée du jazz, de la MPB et de la chanson — entre Méditerranée et Atlantique.", "bio_cta": "Lire la bio complète", "press_quote": "Maud Revol s'impose comme une voix singulière et profondément sensible de la scène musicale contemporaine. Sa voix, à la fois douce et habitée, navigue entre mélancolie et lumières.", "press_attrib": "— Laura Gladin, Nouvelle Vague", "contact_label": "Contact", "contact_title": "Pour les programmateurs · pour les curieux", "contact_text": "Booking, presse, demandes spécifiques — écrivez directement.", "contact_email_label": "E-mail", "contact_phone_label": "Téléphone", "contact_socials_label": "Réseaux", "mus_hero_label": "Discographie", "mus_hero_title": "Musique", "mus_hero_subtitle": "Un EP, des singles, des collaborations.", "mus_ep_label": "Premier EP", "mus_ep_title": "Casa Verde", "mus_ep_date": "29 mai 2026", "mus_ep_text": "Quatre titres en français et en portugais — une maison hybride faite de groove, de lyrisme et de sensualité, au carrefour de la chanson, du jazz, de la bossa-nova et de la musique populaire brésilienne.", "mus_ep_listen_spotify": "Écouter sur Spotify", "mus_ep_listen_apple": "Apple Music", "mus_track_01_title": "Malmousque", "mus_track_01_desc": "Waltz jazz lyrique et contemplative, hommage à la petite anse de la corniche marseillaise. Une journée entière au bord de l'eau, en tableaux.", "mus_track_02_title": "Casa Verde", "mus_track_02_desc": "Chanson éponyme en trois tableaux. Voyage à Recife, novembre 2019 : joie de la transe, malaise de la place qu'on cherche, lâcher-prise.", "mus_track_03_title": "Vanités", "mus_track_03_desc": "Désillusion amoureuse en milonga / tango argentin. « Je ne veux pas payer, ni m'oublier pour être aimée. »", "mus_track_04_title": "Lila Blanc", "mus_track_04_desc": "Poème sur une relation amoureuse à travers la métaphore des saisons. Inspiré de « Beau soir » de Debussy, structure bossa-nova.", "mus_singles_label": "Singles", "mus_singles_title": "Avant l'EP", "mus_premiere_title": "Première Étoile", "mus_premiere_date": "Décembre 2023", "mus_premiere_desc": "Premier titre du nouveau quintet, inaugurant l'ère qui mène à Casa Verde.", "mus_fotografia_title": "Fotografia", "mus_fotografia_date": "Décembre 2023", "mus_fotografia_desc": "Reprise de Tom Jobim, en hommage aux racines brésiliennes qui irriguent le projet.", "mus_collab_label": "Collaborations", "mus_collab_title": "En invité·e", "mus_collab_1_title": "Mister Emptiness", "mus_collab_1_desc": "Apparition vocale sur un titre de Mister Emptiness.", "mus_collab_2_title": "This Place — avec Lola Stouthamer", "mus_collab_2_desc": "Duo avec Lola Stouthamer sur This Place.", "shows_hero_label": "Concerts", "shows_hero_title": "Concerts", "shows_hero_subtitle": "Dates à venir et dates passées.", "shows_upcoming": "À venir", "shows_past": "Passés", "shows_ticket": "Billet", "shows_soldout": "Complet", "shows_info": "Infos", "footer_contact": "Contact", "footer_email_text": "contact[at]maudrevol.com", "footer_phone_text": "+33 6 70 64 39 75", "footer_newsletter": "Newsletter", "footer_newsletter_text": "Lettre mensuelle. Concerts, sorties, et quelques mots de Maud.", "footer_newsletter_placeholder": "Votre e-mail", "footer_newsletter_btn": "S'inscrire", "footer_follow": "Suivre", "footer_legal": "Mentions légales", "footer_credits": "Photos · Baptiste Le Quiniou", "footer_copy": "© 2026 Maud Revol · Tous droits réservés", "modal_title": "Rejoindre la newsletter", "modal_text": "Une lettre mensuelle, courte et personnelle. Pas de spam.", "modal_first": "Prénom", "modal_last": "Nom", "modal_email": "E-mail", "modal_consent": "J'accepte la politique de confidentialité.", "modal_submit": "S'inscrire", "vid_hero_label": "Vidéo", "vid_hero_title": "Vidéo", "vid_hero_subtitle": "Clips, captations et lives.", "vid_main_label": "À l'écran", "vid_media_label": "Autres vidéos", "vid_channel_cta": "Voir la chaîne YouTube", "vid_soon_label": "À venir", "vid_soon_text": "Les clips de l'EP Casa Verde — Malmousque, Casa Verde, Vanités, Lila Blanc — seront mis en ligne au fil des sorties en 2026.", "vid_play": "Lire la vidéo", "vid_atlantica_cap": "Trio Atlantica — mélodies franco-brésiliennes, de la Belle Époque à la saudade.", "vid_manuit_cap": "Ma nuit chez Maud — duo intimiste avec Luke Darlison.", "vid_chega_cap": "Chega de saudade (Antônio Carlos Jobim) — avec Thiago Righi.", "vid_media1_cap": "Live & captations.", "vid_media2_cap": "Live & captations.", "proj_hero_label": "Projets", "proj_hero_title": "Projets", "proj_hero_subtitle": "Quatre formations, une même voix.", "proj_cta": "Découvrir", "proj_5tet_title": "Maud Revol 5tet", "proj_5tet_tag": "Jazz fusion · Casa Verde", "proj_5tet_desc": "Le quintet phare, porteur de l'EP Casa Verde — jazz, MPB et chanson, entre Méditerranée et Atlantique.", "proj_atlantica_title": "Trio Atlantica", "proj_atlantica_tag": "Franco-brésilien · Belle Époque", "proj_atlantica_desc": "Mélodies françaises et brésiliennes, de l'impressionnisme à la saudade carioca, en trio voix-guitare-accordéon.", "proj_thelonious_title": "Thelonious Verse", "proj_thelonious_tag": "Vocalese · Thelonious Monk", "proj_thelonious_desc": "Un spectacle musical sur l'œuvre de Thelonious Monk, en duo voix-piano avec Maryline Ferrero.", "proj_vedettes_title": "Swing Vedettes", "proj_vedettes_tag": "Swing · Jazz manouche · Chanson", "proj_vedettes_desc": "Un quartette autour de Maud Revol qui revisite les standards du jazz américain et la chanson française aux couleurs du jazz manouche de Django Reinhardt.", "sub_back": "← Tous les projets", "p5_label": "Projet", "p5_title": "Maud Revol 5tet", "p5_subtitle": "Le projet phare — son premier EP porté sur scène par un quintet de haute tenue.", "p5_text_1": "On ne trouve pas sa maison du premier coup. Après une longue traversée entre jazz, bossa et chanson, Maud Revol construit la sienne — aujourd'hui elle s'appelle Casa Verde. Le tournant arrive fin 2019 avec un voyage au Brésil : un mois et demi dans une favela au sud de Recife, dans une maison aux murs verts que la communauté appelait la Casa Verde.", "p5_text_2": "Casa Verde, premier EP paru le 29 mai 2026, est le fruit de cette traversée. Entre français et portugais, entre Méditerranée et Atlantique, le projet navigue sur les mers du jazz, de la MPB et de la chanson. Soutenu par la Ville de Marseille et produit par Éclosion 13, le Maud Revol 5tet est aujourd'hui en plein élan.", "p5_members_title": "Le quintet", "atl_label": "Projet", "atl_title": "Trio Atlantica", "atl_subtitle": "Porté par la chanteuse Maud Revol, le Trio Atlantica explore les mélodies françaises et brésiliennes de la Belle Époque à l'après-guerre.", "atl_text_1": "Ernesto Nazareth et Pixinguinha s'encanaillent avec Fauré tandis que Villa-Lobos caracole en tête avec Ravel. La poésie de Baudelaire côtoie celle de Dora Vasconcellos : luxe, calme et voluptés se frayent un chemin jusqu'au cœur à travers les couloirs du temps.", "atl_text_2": "D'un continent à l'autre il n'y a qu'un pas — des envolées impressionnistes à la saudade carioca, le trio tire le fil parfumé d'une musique sophistiquée, métissée, intimiste mais ancrée dans le rythme et la danse.", "atl_text_3": "Le croisement des esthétiques savantes et populaires nourrit le propos d'une formation aux influences modernes : chanson, jazz, poésie et improvisation, au service d'une expression authentique.", "atl_members_title": "Le trio", "thv_label": "Projet", "thv_title": "Thelonious Verse", "thv_subtitle": "Un dialogue entre jazz et poésie autour de l'univers de Thelonious Monk, en duo avec la pianiste Maryline Ferrero.", "thv_concept": "Thelonious Verse explore l'univers fascinant de Thelonious Monk à travers un dialogue entre jazz et poésie. Maud et Maryline réinventent la tradition du vocalese en posant des mots neufs sur les compositions du pianiste légendaire, tissant des liens entre la personnalité de Monk, les femmes qui l'ont entouré et leurs propres parcours.", "thv_demarche_label": "La démarche", "thv_demarche": "Dans la lignée du « Carmen Sings Monk » de Carmen McRae, le duo a d'abord interprété des textes existants, avant de prendre le temps de trouver ses propres mots et d'explorer une perspective contemporaine sur cette œuvre majeure. La musique de Monk devient le prétexte d'une conversation intime entre deux sensibilités d'aujourd'hui et l'héritage intemporel d'un génie.", "thv_members_title": "Le duo", "thv_photo_credit": "Crédits photo : Laetitia Willmann · @tracesfurtives", "ved_label": "Projet", "ved_title": "Swing Vedettes", "ved_subtitle": "Deux guitares, une contrebasse et une voix — swing, jazz manouche et chanson française, dans une ambiance acoustique, festive et intime.", "ved_text": "Swing Vedettes est en cours de création. Plus d'informations très bientôt. Pour toute demande, écrivez à contact[at]maudrevol.com.", "mem_maud_role": "Voix · composition · direction artistique", "mem_maud_bio": "Formée au chant lyrique puis au jazz, nourrie d'un séjour au Brésil ; elle développe depuis Marseille une écriture au croisement du jazz contemporain et des influences latines.", "mem_jeremi_role": "Batterie", "mem_jeremi_bio": "Formé au conservatoire Pierre Barbizet ; il a joué sur les scènes jazz françaises (Baiser Salé, Sunset/Sunside) et européennes (Finlande, Belgique, Écosse).", "mem_yann_role": "Piano", "mem_yann_bio": "Né en Nouvelle-Calédonie, lauréat du prix Sarah Waugh à Sydney ; double formation classique et jazz, récemment sélectionné par le dispositif Trema.", "mem_willy_role": "Contrebasse", "mem_willy_bio": "D'origines guadeloupéenne et sicilienne ; il a collaboré avec le London Symphony Orchestra et divers ensembles de latin jazz et de jazz flamenco.", "mem_luke_role": "Guitare", "mem_luke_bio": "Guitariste et compositeur anglais installé à Marseille, formé à Leeds et au conservatoire Pierre Barbizet ; quinze ans d'expérience entre jazz et musique classique contemporaine.", "mem_wim_role": "Guitare sept cordes", "mem_wim_bio": "Guitariste émérite, complice de longue date des répertoires franco-brésiliens.", "mem_caroline_role": "Accordéon chromatique", "mem_caroline_bio": "Accordéoniste curieuse et polyvalente, également connue sous le nom de Louise O'sman.", "mem_maryline_role": "Piano", "mem_maryline_bio": "Pianiste-compositrice marseillaise influencée par Thelonious Monk, Horace Silver et Wynton Kelly. Elle compose au sein du LMN Trio et s'investit dans la transmission, explorant des univers variés, du big band au septet jazz des années 1920.", "biop_label": "Biographie", "biop_title": "Biographie", "biop_subtitle": "Narratrice, auteure et interprète — je chante mes histoires à l'avant-scène.", "biop_p1": "Bercée par les chanteuses de jazz qui rythmaient les voyages à bord de la voiture maternelle — de Sarah Vaughan à Ella Fitzgerald — c'est sans doute à cette mémoire sonore que Maud doit ses amours alors inconscientes pour l'harmonie et les ballades joliment tortueuses. Sans s'en rendre compte, elle pose pour la première fois sa voix sur les harmonies des autres : elle imite d'abord, puis apprend les solos en les écoutant des dizaines de fois, retient par cœur des mélodies qui, déjà, la font frissonner. La passion et les aptitudes pour le chant naissent là, dans ces premières divagations à travers le jazz chanté.", "biop_p2": "Un émoi adolescent pour Jeff Buckley et Björk, Michael Jackson et Stevie Wonder, une appétence pour la black music… La passion de la voix n'est jamais loin, même si le rock de Blur ou le jazz-world l'emballent tout autant. Le désir d'aller au-delà de l'écoute est là : Maud veut chanter.", "biop_p3": "Forte d'expériences de chorale depuis l'enfance, elle aiguise ses premières armes au Jam de Montpellier. En parallèle de ses études universitaires, elle se forme au chant lyrique au conservatoire de Chambéry — Poulenc, Ravel, Fauré. Puis un an de volontariat en Moldavie, où le spleen tsigane de Romica Puceanu et les romances russes la bouleversent. Elle y vit ses premières scènes publiques.", "biop_p4": "Fraîchement installée à Marseille en 2013, elle travaille quelques années dans l'associatif, mais une évidence monte doucement : la scène, plutôt qu'un bureau. De 2013 à 2018, elle monte deux duos, un trio et un quartet qui tournent sur les petites scènes phocéennes, autour de la bossa, des standards et du jazz instrumental. La créativité foisonne, l'envie d'apprendre bouillonne.", "biop_p5": "Après deux années à l'IMFP de Salon-de-Provence, elle entre au conservatoire Pierre Barbizet et monte le projet Balacobaco, sélectionné sur une scène tremplin du festival Marseille Jazz des Cinq Continents. Désireuse d'approfondir sa connaissance du Nordeste brésilien et de la langue portugaise, elle part trois mois au Brésil juste avant la pandémie, et s'y lie d'amitié avec le guitariste Thiago Righi. Un voyage qui l'emplit de matière musicale.", "biop_p6": "Diplôme en poche en 2021, le champ des possibles s'éclaire : écrire, jouer, s'entourer. Fauré et Poulenc comme obsessions, elle se surprend à les chiffrer comme des standards et rêve de les mêler au répertoire brésilien du début du XXe siècle. En naît Atlantica, en trio aux côtés de Wim Welker à la guitare et de Caroline Guibeaud à l'accordéon.", "biop_p7": "Aujourd'hui, Maud habite pleinement le monde sonore qu'elle a construit. <em>Casa Verde</em>, son premier EP paru le 29 mai 2026, ancre cette vision : un jazz intimiste et solaire, tissé entre les rives du Nordeste et la lumière méditerranéenne, qu'elle déploie sur scène avec son quintet.", "biop_quintet_label": "Le quintet", "biop_quintet_title": "Maud Revol 5tet", "biop_quintet_intro": "Sur scène, Maud s'entoure de quatre musiciens marseillais aux parcours riches mêlant jazz, classique et musiques du monde.", "ct_label": "Contact", "ct_title": "Écrivons-nous", "ct_intro": "Booking, presse, demandes spécifiques — la voie la plus directe, c'est l'e-mail.", "ct_booking_label": "Booking & presse", "ct_booking_text": "Pour programmer un concert ou recevoir le dossier de presse, écrivez directement. Réponse assurée.", "ct_newsletter_title": "La lettre de Maud", "ct_newsletter_text": "Une lettre mensuelle, courte et personnelle : concerts, sorties, et quelques mots. Pas de spam.", "mn_label": "Mentions légales", "mn_title": "Mentions légales", "mn_editor_label": "Éditeur du site", "mn_editor_intro": "Le présent site est édité dans le cadre de l'activité artistique de Maud Revol, autrice-compositrice-interprète, accompagnée et produite par l'association Éclosion 13.", "mn_director_label": "Directrice de la publication", "mn_publication_label": "Production & soutien", "mn_publication_text": "Maud Revol est accompagnée depuis 2021 par l'association Éclosion 13 (portage, production, développement) et soutenue par la Ville de Marseille et le Département des Bouches-du-Rhône.", "mn_hosting_label": "Hébergement", "mn_hosting_text": "Site hébergé sur une infrastructure web mutualisée. Les coordonnées de l'hébergeur seront précisées à la mise en ligne.", "mn_rights_label": "Droits d'auteur", "mn_rights_text": "Maud Revol est affiliée à la SACEM et à l'ADAMI. L'ensemble des textes, compositions, photographies et éléments graphiques de ce site sont protégés. Toute reproduction est soumise à autorisation.", "mn_rgpd_label": "Données personnelles (RGPD)", "mn_rgpd_text": "Les informations recueillies via le formulaire de newsletter (prénom, nom, e-mail) servent uniquement à l'envoi de la lettre d'information. Elles ne sont ni cédées ni revendues. Conformément au RGPD, vous disposez d'un droit d'accès, de rectification et de suppression de vos données — écrivez à contact[at]maudrevol.com ou utilisez le lien de désinscription présent dans chaque envoi.", "mn_credits_label": "Crédits", "mn_credits_text": "Photographies : Baptiste Le Quiniou · Vidéos : Benjamin Rando · Photos Thelonious Verse : Laetitia Willmann (@tracesfurtives).", "mn_designation_label": "Désignation", "mn_designation_text": "Maud Revol — autrice-compositrice-interprète.", "mus_intro_text": "Conçues entre les vagues du Nordeste et de la méditerranée, quatre histoires intimistes et solaires nourris de jazz, de groove latins et de poésie brésilienne", "mus_other_platforms": "aussi disponible sur les autres plateformes", "ved_text_1": "Swing Vedettes réunit Maud Revol (chant), Jérémie Schacre et Mathieu Césari (guitares) et Stéphane Bularz (contrebasse). Le quartette revisite les grands standards du jazz américain et des pépites de la chanson française en les teintant des couleurs du jazz manouche de Django Reinhardt. La voix de Maud Revol y prend sa place comme un véritable instrument, au sein d'un ensemble de musiciens complices et passionnés — une invitation à redécouvrir les univers d'Ella Fitzgerald, Boris Vian, Henri Salvador ou encore Édith Piaf.", "ved_text_2": "Né au printemps 2025 d'une rencontre autour d'Ici Jazz Fest (Jazz des Cinq Continents), le projet puise son énergie dans le swing et les improvisations inspirées de Django Reinhardt, tout en cultivant la poésie propre à la chanson française. Swing Vedettes propose un spectacle vivant, à la fois festif et intimiste, dans une ambiance purement acoustique au plus près des sonorités et des nuances de leurs instruments.", "mus_pitch_malmousque": "Lieu de répit à Marseille lorsque la ville devient trop chaotique et envahissante. Le titre est une valse jazz lyrique et contemplative en hommage à la mer Méditerranée et au soleil qui brunit les peaux et échauffe les cœurs.", "mus_pitch_casaverde": "Chanson éponyme de l'album, la casa verde (maison verte) est aussi l'endroit où Maud Revol a vécu à Recife, dans la communauté du Bode. Ce morceau aux ambiances très contrastées retranscrit la richesse des rencontres et l'intensité des émotions traversées durant ce séjour brésilien.", "mus_pitch_vanites": "« Vanités » dit ce qu'on n'ose pas toujours dire : non, ce n'est pas comme ça qu'on aime. C'est avant tout un refus — celui de la violence faite au nom de l'amour, et la décision de ne plus y payer sa place. Un acte de dignité autant qu'une chanson d'amour, porté par une écriture jazz et un rythme de milonga.", "mus_pitch_lilablanc": "Avant d'être une chanson, « Lila blanc » est un poème écrit à partir d'un petit texte en prose qui relate les étapes d'une relation amoureuse. Inspirée d'une mélodie de Debussy, la chanson est une bossa-nova mystérieuse et élégante.", "p5_arrangements_label": "Arrangements", "p5_arrangements_text": "Arrangements : Max Parato — arrangeur des titres « Malmousque », « Casa Verde » et « Lila Blanc ».", "vid_casaverde_cap": "Casa Verde — Maud Revol 5tet.", "vid_lilablanc_cap": "Lila Blanc — Maud Revol 5tet.", "vid_vanites_cap": "Vanités — live au Petit Duc, Aix-en-Provence.", "vid_premiere_cap": "Première Étoile — Maud Revol 5tet.", "vid_fotografia_cap": "Fotografia — reprise de Tom Jobim.", "vid_aubord_cap": "Au bord de l'eau (Gabriel Fauré) — avec Wim Welker.", "vid_chemins_cap": "Les chemins de l'amour (Francis Poulenc) — avec Wim Welker.", "vid_soon_date_lilablanc": "À venir — 05.07.2026", "vid_soon_date_vanites": "À venir", "vid_samba_cap": "Samba e amor / While my guitar gently weeps — avec Thiago Righi.", "vid_syracuse_cap": "Syracuse (Henri Salvador) — avec Thiago Righi.", "vid_beausoir_cap": "Beau Soir (Claude Debussy) — avec Wim Welker.", "mus_discover_band": "Découvrir le groupe", "mus_press_label": "Presse", "mus_press_title": "Ils en parlent", "mus_press_cta": "Lire l'article", "mus_all_platforms_btn": "Écouter sur toutes les plateformes →"}, "en": {"nav_home": "Home", "nav_music": "Music", "nav_video": "Video", "nav_shows": "Shows", "nav_projets": "Projects", "nav_bio": "Bio", "nav_contact": "Contact", "nav_newsletter": "Newsletter", "tagline": "Songwriter — singer — composer", "hero_ep_label": "DEBUT EP", "hero_title": "Casa Verde", "hero_subtitle": "A jazz voice drawing on Brazilian and Latin-jazz poetry — a hunger for life, a bittersweet melancholy.", "hero_release": "EP — May 29, 2026", "hero_party": "Release party — June 3 · Le Talus, Marseille", "hero_cta_listen": "Listen to Casa Verde", "hero_cta_support": "Support the project", "news_label": "Now", "news_title": "Three things happening", "news_ep_kicker": "The EP", "news_ep_title": "Casa Verde out May 29, 2026", "news_ep_text": "Four tracks in French and Portuguese — Malmousque, Casa Verde, Vanités, Lila Blanc. Mediterranean, Atlantic, jazz, MPB, chanson. On all platforms.", "news_ep_cta": "Discover the music", "news_party_kicker": "Behind the scenes", "news_party_title": "Behind the scenes of Casa Verde", "news_party_text": "The release party took place on June 3rd at Le Talus. Relive the making of the EP and the concert in photos and videos on social media.", "news_party_cta": "View on Instagram", "news_cf_kicker": "Crowdfunding", "news_cf_title": "Help the show happen", "news_cf_text": "For the release party and the Petit Duc residency in October 2026. Contributions from €5 — tax receipt available via Éclosion 13.", "news_cf_cta": "Contribute", "bio_label": "Bio", "bio_title": "Narrator, author, performer", "bio_subtitle": "I sing my stories from the front of the stage.", "bio_text": "Born into a family of classical musicians, Maud's first musical thrills came from Ella Fitzgerald's scats and Tania Maria's piano. Choir as a child, the Jam in Montpellier as a teenager, lyrical singing in Chambéry, then Marseille in 2013 — IMFP, the conservatoire, jazz. A stay in Brazil in late 2019 left a lasting mark on her writing: Casa Verde, her debut EP, is the fruit of that journey. Today she composes at the crossroads of jazz, MPB and chanson — between the Mediterranean and the Atlantic.", "bio_cta": "Read the full bio", "press_quote": "Maud Revol stands out as a singular and deeply sensitive voice on the contemporary music scene. Her voice, at once gentle and inhabited, navigates between melancholy and light.", "press_attrib": "— Laura Gladin, Nouvelle Vague", "contact_label": "Contact", "contact_title": "For bookers · for curious listeners", "contact_text": "Booking, press, specific requests — write directly.", "contact_email_label": "Email", "contact_phone_label": "Phone", "contact_socials_label": "Socials", "mus_hero_label": "Discography", "mus_hero_title": "Music", "mus_hero_subtitle": "One EP, singles, collaborations.", "mus_ep_label": "Debut EP", "mus_ep_title": "Casa Verde", "mus_ep_date": "May 29, 2026", "mus_ep_text": "Four tracks in French and Portuguese — a hybrid house made of groove, lyricism and sensuality, at the crossroads of chanson, jazz, bossa-nova and Brazilian popular music.", "mus_ep_listen_spotify": "Listen on Spotify", "mus_ep_listen_apple": "Apple Music", "mus_track_01_title": "Malmousque", "mus_track_01_desc": "Lyrical, contemplative jazz waltz — tribute to a hidden cove on the Marseille coast. A whole day by the sea, in tableaux.", "mus_track_02_title": "Casa Verde", "mus_track_02_desc": "Title track in three tableaux. A journey to Recife in November 2019: the joy of the trance, the unease of belonging, letting go.", "mus_track_03_title": "Vanités", "mus_track_03_desc": "Heartbreak in milonga / Argentine tango. \"I won't pay, I won't forget myself to be loved.\"", "mus_track_04_title": "Lila Blanc", "mus_track_04_desc": "A poem about love through the metaphor of the seasons. Inspired by Debussy's \"Beau soir\", bossa-nova structure.", "mus_singles_label": "Singles", "mus_singles_title": "Before the EP", "mus_premiere_title": "Première Étoile", "mus_premiere_date": "December 2023", "mus_premiere_desc": "First track of the new quintet, opening the path that leads to Casa Verde.", "mus_fotografia_title": "Fotografia", "mus_fotografia_date": "December 2023", "mus_fotografia_desc": "A Tom Jobim cover, paying tribute to the Brazilian roots that run through the project.", "mus_collab_label": "Collaborations", "mus_collab_title": "As a guest", "mus_collab_1_title": "Mister Emptiness", "mus_collab_1_desc": "Vocal feature on a Mister Emptiness track.", "mus_collab_2_title": "This Place — with Lola Stouthamer", "mus_collab_2_desc": "Duet with Lola Stouthamer on This Place.", "shows_hero_label": "Concerts", "shows_hero_title": "Shows", "shows_hero_subtitle": "Upcoming and past dates.", "shows_upcoming": "Upcoming", "shows_past": "Past", "shows_ticket": "Ticket", "shows_soldout": "Sold out", "shows_info": "Info", "footer_contact": "Contact", "footer_email_text": "contact[at]maudrevol.com", "footer_phone_text": "+33 6 70 64 39 75", "footer_newsletter": "Newsletter", "footer_newsletter_text": "Monthly letter. Concerts, releases, and a few words from Maud.", "footer_newsletter_placeholder": "Your email", "footer_newsletter_btn": "Subscribe", "footer_follow": "Follow", "footer_legal": "Legal", "footer_credits": "Photos · Baptiste Le Quiniou", "footer_copy": "© 2026 Maud Revol · All rights reserved", "modal_title": "Join the newsletter", "modal_text": "A short, personal monthly letter. No spam.", "modal_first": "First name", "modal_last": "Last name", "modal_email": "Email", "modal_consent": "I accept the privacy policy.", "modal_submit": "Subscribe", "vid_hero_label": "Video", "vid_hero_title": "Video", "vid_hero_subtitle": "Clips, sessions and live footage.", "vid_main_label": "On screen", "vid_media_label": "More videos", "vid_channel_cta": "Visit the YouTube channel", "vid_soon_label": "Coming soon", "vid_soon_text": "The Casa Verde EP videos — Malmousque, Casa Verde, Vanités, Lila Blanc — will go online as the singles are released through 2026.", "vid_play": "Play video", "vid_atlantica_cap": "Trio Atlantica — French-Brazilian melodies, from the Belle Époque to saudade.", "vid_manuit_cap": "Ma nuit chez Maud — an intimate duo with Luke Darlison.", "vid_chega_cap": "Chega de saudade (Antônio Carlos Jobim) — with Thiago Righi.", "vid_media1_cap": "Live & sessions.", "vid_media2_cap": "Live & sessions.", "proj_hero_label": "Projects", "proj_hero_title": "Projects", "proj_hero_subtitle": "Four ensembles, one voice.", "proj_cta": "Explore", "proj_5tet_title": "Maud Revol 5tet", "proj_5tet_tag": "Jazz fusion · Casa Verde", "proj_5tet_desc": "The flagship quintet behind the Casa Verde EP — jazz, MPB and chanson, between the Mediterranean and the Atlantic.", "proj_atlantica_title": "Trio Atlantica", "proj_atlantica_tag": "French-Brazilian · Belle Époque", "proj_atlantica_desc": "French and Brazilian melodies, from impressionism to Rio's saudade, as a voice-guitar-accordion trio.", "proj_thelonious_title": "Thelonious Verse", "proj_thelonious_tag": "Vocalese · Thelonious Monk", "proj_thelonious_desc": "A musical show on the work of Thelonious Monk, as a voice-piano duo with Maryline Ferrero.", "proj_vedettes_title": "Swing Vedettes", "proj_vedettes_tag": "Swing · Gypsy jazz · Chanson", "proj_vedettes_desc": "A quartet around Maud Revol revisiting American jazz standards and French chanson in the colours of Django Reinhardt's gypsy jazz.", "sub_back": "← All projects", "p5_label": "Project", "p5_title": "Maud Revol 5tet", "p5_subtitle": "The flagship project — her debut EP brought to the stage by a first-rate quintet.", "p5_text_1": "You don't find your home on the first try. After a long crossing through jazz, bossa and chanson, Maud Revol is building hers — today it is called Casa Verde. The turning point comes in late 2019 with a journey to Brazil: a month and a half in a favela south of Recife, in a house with green walls the community called the Casa Verde.", "p5_text_2": "Casa Verde, her debut EP released on 29 May 2026, is the fruit of that crossing. Between French and Portuguese, between the Mediterranean and the Atlantic, the project sails the seas of jazz, MPB and chanson. Supported by the City of Marseille and produced by Éclosion 13, the Maud Revol 5tet is now in full swing.", "p5_members_title": "The quintet", "atl_label": "Project", "atl_title": "Trio Atlantica", "atl_subtitle": "Led by singer Maud Revol, Trio Atlantica explores French and Brazilian melodies from the Belle Époque to the post-war years.", "atl_text_1": "Ernesto Nazareth and Pixinguinha rub shoulders with Fauré while Villa-Lobos races ahead with Ravel. Baudelaire's poetry meets that of Dora Vasconcellos: luxe, calme et volupté find their way to the heart through the corridors of time.", "atl_text_2": "From one continent to the other is but a step — from impressionist flights to Rio's saudade, the trio draws the fragrant thread of a music that is sophisticated, mixed, intimate, yet rooted in rhythm and dance.", "atl_text_3": "The crossing of art-music and popular aesthetics feeds the voice of an ensemble with modern influences: chanson, jazz, poetry and improvisation, in the service of an authentic expression.", "atl_members_title": "The trio", "thv_label": "Project", "thv_title": "Thelonious Verse", "thv_subtitle": "A dialogue between jazz and poetry around the world of Thelonious Monk, as a duo with pianist Maryline Ferrero.", "thv_concept": "Thelonious Verse explores the fascinating world of Thelonious Monk through a dialogue between jazz and poetry. Maud and Maryline reinvent the vocalese tradition by setting new words to the legendary pianist's compositions, weaving connections between Monk's personality, the women around him and their own journeys.", "thv_demarche_label": "The approach", "thv_demarche": "In the lineage of Carmen McRae's “Carmen Sings Monk”, the duo first performed existing texts, before taking the time to find their own words and explore a contemporary perspective on this major body of work. Monk's music becomes the pretext for an intimate conversation between two present-day sensibilities and the timeless legacy of a genius.", "thv_members_title": "The duo", "thv_photo_credit": "Photo credits: Laetitia Willmann · @tracesfurtives", "ved_label": "Project", "ved_title": "Swing Vedettes", "ved_subtitle": "Two guitars, a double bass and a voice — swing, gypsy jazz and French chanson, in an acoustic atmosphere both festive and intimate.", "ved_text": "Swing Vedettes is currently being created. More information very soon. For any enquiry, write to contact[at]maudrevol.com.", "mem_maud_role": "Voice · composition · artistic direction", "mem_maud_bio": "Trained in classical voice then jazz, shaped by a stay in Brazil; from Marseille she develops a writing at the crossroads of contemporary jazz and Latin influences.", "mem_jeremi_role": "Drums", "mem_jeremi_bio": "Trained at the Pierre Barbizet conservatoire; he has played on French jazz stages (Baiser Salé, Sunset/Sunside) and across Europe (Finland, Belgium, Scotland).", "mem_yann_role": "Piano", "mem_yann_bio": "Born in New Caledonia, winner of the Sarah Waugh prize in Sydney; dual classical and jazz training, recently selected by the Trema programme.", "mem_willy_role": "Double bass", "mem_willy_bio": "Of Guadeloupean and Sicilian heritage; he has collaborated with the London Symphony Orchestra and various latin-jazz and flamenco-jazz ensembles.", "mem_luke_role": "Guitar", "mem_luke_bio": "English guitarist and composer based in Marseille, trained in Leeds and at the Pierre Barbizet conservatoire; fifteen years of experience between jazz and contemporary classical music.", "mem_wim_role": "Seven-string guitar", "mem_wim_bio": "A distinguished guitarist and long-time companion of French-Brazilian repertoires.", "mem_caroline_role": "Chromatic accordion", "mem_caroline_bio": "A curious and versatile accordionist, also known as Louise O'sman.", "mem_maryline_role": "Piano", "mem_maryline_bio": "Marseille pianist-composer influenced by Thelonious Monk, Horace Silver and Wynton Kelly. She composes within the LMN Trio and is committed to teaching, exploring varied worlds from big band to 1920s jazz septet.", "biop_label": "Biography", "biop_title": "Biography", "biop_subtitle": "Narrator, author and performer — I sing my stories from the front of the stage.", "biop_p1": "Lulled by the jazz singers who set the rhythm of car journeys with her mother — from Sarah Vaughan to Ella Fitzgerald — it is perhaps to that early sonic memory that Maud owes her then-unconscious love of harmony and beautifully winding ballads. Without realising it, she first lays her voice over others' harmonies: imitating at first, then learning the solos by listening dozens of times over, committing to memory melodies that already send shivers through her. Her passion and gift for singing are born there, in those first wanderings through sung jazz.", "biop_p2": "A teenage infatuation with Jeff Buckley and Björk, Michael Jackson and Stevie Wonder, an appetite for black music… The love of the voice is never far, even as Blur's rock or world-jazz thrill her just as much. The urge to go beyond listening is there: Maud wants to sing.", "biop_p3": "Drawing on a childhood of choral singing, she sharpens her first solo skills at the Jam in Montpellier. Alongside her university studies she trains in classical voice at the Chambéry conservatoire — Poulenc, Ravel, Fauré. Then a year of volunteering in Moldova, where Romica Puceanu's Romani spleen and Russian romances move her deeply. There she performs in public for the first time.", "biop_p4": "Newly settled in Marseille in 2013, she works for a few years in the non-profit sector, but a quiet certainty rises: the stage, rather than a desk. Between 2013 and 2018 she forms two duos, a trio and a quartet that play the small Marseille stages — bossa, standards and instrumental jazz. Creativity abounds; the desire to learn keeps bubbling.", "biop_p5": "After two years at the IMFP in Salon-de-Provence, she enters the Pierre Barbizet conservatoire and forms the Balacobaco project, selected for a showcase stage at the Marseille Jazz des Cinq Continents festival. Eager to deepen her knowledge of Brazil's Nordeste and the Portuguese language, she leaves for three months in Brazil just before the pandemic, befriending guitarist Thiago Righi. A journey that fills her with musical material.", "biop_p6": "Degree in hand in 2021, the field of possibility opens up: to write, to play, to gather musicians. Fauré and Poulenc as lingering obsessions, she finds herself charting their chords like standards and dreams of weaving them into the early-20th-century Brazilian repertoire. From this is born Atlantica, a trio alongside Wim Welker on guitar and Caroline Guibeaud on accordion.", "biop_p7": "Today, Maud fully inhabits the sonic world she has built. <em>Casa Verde</em>, her debut EP released on 29 May 2026, anchors this vision: intimate, sun-drenched jazz, woven between the shores of the Nordeste and the Mediterranean light, which she unfolds on stage with her quintet.", "biop_quintet_label": "The quintet", "biop_quintet_title": "Maud Revol 5tet", "biop_quintet_intro": "On stage, Maud surrounds herself with four Marseille musicians whose rich paths blend jazz, classical and world music.", "ct_label": "Contact", "ct_title": "Let's write", "ct_intro": "Booking, press, specific requests — the most direct way is email.", "ct_booking_label": "Booking & press", "ct_booking_text": "To programme a concert or receive the press kit, write directly. A reply is guaranteed.", "ct_newsletter_title": "Maud's letter", "ct_newsletter_text": "A short, personal monthly letter: concerts, releases, and a few words. No spam.", "mn_label": "Legal notice", "mn_title": "Legal notice", "mn_editor_label": "Site publisher", "mn_editor_intro": "This site is published as part of the artistic activity of Maud Revol, songwriter-singer-composer, supported and produced by the association Éclosion 13.", "mn_director_label": "Publication director", "mn_publication_label": "Production & support", "mn_publication_text": "Maud Revol has been supported since 2021 by the association Éclosion 13 (administration, production, development) and by the City of Marseille and the Bouches-du-Rhône department.", "mn_hosting_label": "Hosting", "mn_hosting_text": "Site hosted on a shared web infrastructure. The host's details will be specified upon going live.", "mn_rights_label": "Copyright", "mn_rights_text": "Maud Revol is affiliated with SACEM and ADAMI. All texts, compositions, photographs and graphic elements on this site are protected. Any reproduction requires authorisation.", "mn_rgpd_label": "Personal data (GDPR)", "mn_rgpd_text": "The information collected via the newsletter form (first name, last name, email) is used solely to send the newsletter. It is neither shared nor sold. In accordance with the GDPR, you have the right to access, rectify and delete your data — write to contact[at]maudrevol.com or use the unsubscribe link in every mailing.", "mn_credits_label": "Credits", "mn_credits_text": "Photography: Baptiste Le Quiniou · Video: Benjamin Rando · Thelonious Verse photos: Laetitia Willmann (@tracesfurtives).", "mn_designation_label": "Designation", "mn_designation_text": "Maud Revol — songwriter, singer, composer.", "mus_intro_text": "Born amidst the waves of Northeastern Brazil and the Mediterranean, four intimate, sun-drenched stories infused with jazz, Latin grooves, and Brazilian poetry", "mus_other_platforms": "also available on other platforms", "ved_text_1": "Swing Vedettes brings together Maud Revol (voice), Jérémie Schacre and Mathieu Césari (guitars) and Stéphane Bularz (double bass). The quartet revisits the great American jazz standards and gems of French chanson, tinting them with the colours of Django Reinhardt's gypsy jazz. Maud Revol's voice takes its place as a true instrument within an ensemble of close, passionate musicians — an invitation to rediscover the worlds of Ella Fitzgerald, Boris Vian, Henri Salvador and Édith Piaf.", "ved_text_2": "Born in spring 2025 from an encounter around Ici Jazz Fest (Jazz des Cinq Continents), the project draws its energy from swing and improvisations inspired by Django Reinhardt, while cultivating the poetry of French chanson. Swing Vedettes offers a vibrant show, both festive and intimate, in a purely acoustic atmosphere that stays close to the sonorities and nuances of their instruments.", "mus_pitch_malmousque": "A refuge in Marseille when the city becomes too chaotic and overwhelming. The track is a lyrical, contemplative jazz waltz paying homage to the Mediterranean Sea and the sun that warms skin and hearts.", "mus_pitch_casaverde": "The album's title track, the casa verde (green house) is also the place where Maud Revol lived in Recife, in the Bode community. This piece with its sharply contrasting atmospheres captures the richness of the encounters and the intensity of the emotions lived during her time in Brazil.", "mus_pitch_vanites": "\"Vanités\" says what we don't always dare say: no, that is not how one loves. It is above all a refusal — of the violence done in the name of love, and the decision to stop paying one's way into it. An act of dignity as much as a love song, carried by jazz writing and a milonga rhythm.", "mus_pitch_lilablanc": "Before being a song, \"Lila blanc\" is a poem written from a short prose text tracing the stages of a love affair. Inspired by a Debussy melody, the song is a mysterious and elegant bossa-nova.", "p5_arrangements_label": "Arrangements", "p5_arrangements_text": "Arrangements: Max Parato — arranger of the tracks \"Malmousque\", \"Casa Verde\" and \"Lila Blanc\".", "vid_casaverde_cap": "Casa Verde — Maud Revol 5tet.", "vid_lilablanc_cap": "Lila Blanc — Maud Revol 5tet.", "vid_vanites_cap": "Vanités — live at Le Petit Duc, Aix-en-Provence.", "vid_premiere_cap": "Première Étoile — Maud Revol 5tet.", "vid_fotografia_cap": "Fotografia — Tom Jobim cover.", "vid_aubord_cap": "Au bord de l'eau (Gabriel Fauré) — with Wim Welker.", "vid_chemins_cap": "Les chemins de l'amour (Francis Poulenc) — with Wim Welker.", "vid_soon_date_lilablanc": "Coming — 05.07.2026", "vid_soon_date_vanites": "Coming soon", "vid_samba_cap": "Samba e amor / While my guitar gently weeps — with Thiago Righi.", "vid_syracuse_cap": "Syracuse (Henri Salvador) — with Thiago Righi.", "vid_beausoir_cap": "Beau Soir (Claude Debussy) — with Wim Welker.", "mus_discover_band": "Discover the band", "mus_press_label": "Press", "mus_press_title": "Press & media", "mus_press_cta": "Read the article", "mus_all_platforms_btn": "Listen on all platforms →"}, "de": {"nav_home": "Start", "nav_music": "Musik", "nav_video": "Video", "nav_shows": "Konzerte", "nav_projets": "Projekte", "nav_bio": "Bio", "nav_contact": "Kontakt", "nav_newsletter": "Newsletter", "tagline": "Sängerin · Komponistin · Texterin", "hero_ep_label": "DEBÜT-EP", "hero_title": "Casa Verde", "hero_subtitle": "Eine Jazz-Stimme, die aus der Poesie Brasiliens und des Latin-Jazz schöpft — Lebenshunger, süß-bittere Melancholie.", "hero_release": "EP — 29. Mai 2026", "hero_party": "Release-Party — 3. Juni · Le Talus, Marseille", "hero_cta_listen": "Casa Verde anhören", "hero_cta_support": "Projekt unterstützen", "news_label": "Gerade jetzt", "news_title": "Drei Dinge auf einmal", "news_ep_kicker": "Die EP", "news_ep_title": "Casa Verde erscheint am 29. Mai 2026", "news_ep_text": "Vier Stücke auf Französisch und Portugiesisch — Malmousque, Casa Verde, Vanités, Lila Blanc. Mittelmeer, Atlantik, Jazz, MPB, Chanson. Auf allen Plattformen.", "news_ep_cta": "Musik entdecken", "news_party_kicker": "Behind the Scenes", "news_party_title": "Hinter den Kulissen von Casa Verde", "news_party_text": "Die Release-Party fand am 3. Juni im Le Talus statt. Erlebe die Entstehung der EP und das Konzert in Fotos und Videos auf Social Media.", "news_party_cta": "Auf Instagram ansehen", "news_cf_kicker": "Crowdfunding", "news_cf_title": "Macht das Konzert möglich", "news_cf_text": "Für die Release-Party und die Residenz im Petit Duc im Oktober 2026. Beiträge ab 5 € — Spendenquittung über Éclosion 13 möglich.", "news_cf_cta": "Mitmachen", "bio_label": "Bio", "bio_title": "Erzählerin, Autorin, Interpretin", "bio_subtitle": "Ich singe meine Geschichten — vorne, an der Rampe.", "bio_text": "Maud wuchs in einer Familie klassischer Musiker auf. Ihre ersten musikalischen Schauer kamen von Ella Fitzgeralds Scats und Tania Marias Klavier. Chor als Kind, das Jam in Montpellier als Jugendliche, klassischer Gesang in Chambéry, dann ab 2013 Marseille — IMFP, Konservatorium, Jazz. Eine Brasilien-Reise Ende 2019 prägt ihr Schreiben nachhaltig: Casa Verde, ihre Debüt-EP, ist die Frucht dieser Reise. Heute komponiert sie an der Schnittstelle von Jazz, MPB und Chanson — zwischen Mittelmeer und Atlantik.", "bio_cta": "Vollständige Bio lesen", "press_quote": "Maud Revol etabliert sich als einzigartige und sehr feinfühlige Stimme der zeitgenössischen Musikszene. Ihre Stimme, zugleich sanft und bewohnt, bewegt sich zwischen Melancholie und Licht.", "press_attrib": "— Laura Gladin, Nouvelle Vague", "contact_label": "Kontakt", "contact_title": "Für Veranstalter · für Neugierige", "contact_text": "Booking, Presse, konkrete Anfragen — direkt schreiben.", "contact_email_label": "E-Mail", "contact_phone_label": "Telefon", "contact_socials_label": "Social", "mus_hero_label": "Diskografie", "mus_hero_title": "Musik", "mus_hero_subtitle": "Eine EP, Singles, Kollaborationen.", "mus_ep_label": "Debüt-EP", "mus_ep_title": "Casa Verde", "mus_ep_date": "29. Mai 2026", "mus_ep_text": "Vier Stücke auf Französisch und Portugiesisch — ein hybrides Zuhause aus Groove, Lyrik und Sinnlichkeit, an der Kreuzung von Chanson, Jazz, Bossa-Nova und brasilianischer Popmusik.", "mus_ep_listen_spotify": "Auf Spotify hören", "mus_ep_listen_apple": "Apple Music", "mus_track_01_title": "Malmousque", "mus_track_01_desc": "Lyrisch-kontemplativer Jazz-Walzer — Hommage an eine versteckte Bucht der Marseiller Küste. Ein ganzer Tag am Meer, in Tableaus.", "mus_track_02_title": "Casa Verde", "mus_track_02_desc": "Titelstück in drei Tableaus. Reise nach Recife, November 2019: Freude der Trance, Beklemmung des Nicht-am-Platz-Seins, Loslassen.", "mus_track_03_title": "Vanités", "mus_track_03_desc": "Liebes-Desillusion als Milonga / argentinischer Tango. „Ich will nicht zahlen, mich nicht vergessen, um geliebt zu werden.“", "mus_track_04_title": "Lila Blanc", "mus_track_04_desc": "Gedicht über eine Liebesgeschichte durch die Metapher der Jahreszeiten. Inspiriert von Debussys „Beau soir“, Bossa-Nova-Struktur.", "mus_singles_label": "Singles", "mus_singles_title": "Vor der EP", "mus_premiere_title": "Première Étoile", "mus_premiere_date": "Dezember 2023", "mus_premiere_desc": "Erstes Stück des neuen Quintetts — eröffnet den Weg zu Casa Verde.", "mus_fotografia_title": "Fotografia", "mus_fotografia_date": "Dezember 2023", "mus_fotografia_desc": "Tom-Jobim-Cover — Verbeugung vor den brasilianischen Wurzeln des Projekts.", "mus_collab_label": "Kollaborationen", "mus_collab_title": "Als Gast", "mus_collab_1_title": "Mister Emptiness", "mus_collab_1_desc": "Gesangsfeature auf einem Track von Mister Emptiness.", "mus_collab_2_title": "This Place — mit Lola Stouthamer", "mus_collab_2_desc": "Duett mit Lola Stouthamer auf This Place.", "shows_hero_label": "Konzerte", "shows_hero_title": "Konzerte", "shows_hero_subtitle": "Kommende und vergangene Termine.", "shows_upcoming": "Kommende", "shows_past": "Vergangene", "shows_ticket": "Ticket", "shows_soldout": "Ausverkauft", "shows_info": "Info", "footer_contact": "Kontakt", "footer_email_text": "contact[at]maudrevol.com", "footer_phone_text": "+33 6 70 64 39 75", "footer_newsletter": "Newsletter", "footer_newsletter_text": "Monatlicher Brief. Konzerte, Releases, ein paar Worte von Maud.", "footer_newsletter_placeholder": "Deine E-Mail", "footer_newsletter_btn": "Abonnieren", "footer_follow": "Folgen", "footer_legal": "Impressum", "footer_credits": "Fotos · Baptiste Le Quiniou", "footer_copy": "© 2026 Maud Revol · Alle Rechte vorbehalten", "modal_title": "Newsletter abonnieren", "modal_text": "Ein kurzer, persönlicher Monatsbrief. Kein Spam.", "modal_first": "Vorname", "modal_last": "Nachname", "modal_email": "E-Mail", "modal_consent": "Ich akzeptiere die Datenschutzerklärung.", "modal_submit": "Abonnieren", "vid_hero_label": "Video", "vid_hero_title": "Video", "vid_hero_subtitle": "Clips, Mitschnitte und Live-Aufnahmen.", "vid_main_label": "Auf der Leinwand", "vid_media_label": "Weitere Videos", "vid_channel_cta": "Zum YouTube-Kanal", "vid_soon_label": "Demnächst", "vid_soon_text": "Die Clips zur EP Casa Verde — Malmousque, Casa Verde, Vanités, Lila Blanc — gehen im Laufe der Single-Veröffentlichungen 2026 online.", "vid_play": "Video abspielen", "vid_atlantica_cap": "Trio Atlantica — französisch-brasilianische Melodien, von der Belle Époque bis zur Saudade.", "vid_manuit_cap": "Ma nuit chez Maud — intimes Duo mit Luke Darlison.", "vid_chega_cap": "Chega de saudade (Antônio Carlos Jobim) — mit Thiago Righi.", "vid_media1_cap": "Live & Mitschnitte.", "vid_media2_cap": "Live & Mitschnitte.", "proj_hero_label": "Projekte", "proj_hero_title": "Projekte", "proj_hero_subtitle": "Vier Formationen, eine Stimme.", "proj_cta": "Entdecken", "proj_5tet_title": "Maud Revol 5tet", "proj_5tet_tag": "Jazz Fusion · Casa Verde", "proj_5tet_desc": "Das Aushängeschild-Quintett hinter der EP Casa Verde — Jazz, MPB und Chanson, zwischen Mittelmeer und Atlantik.", "proj_atlantica_title": "Trio Atlantica", "proj_atlantica_tag": "Französisch-brasilianisch · Belle Époque", "proj_atlantica_desc": "Französische und brasilianische Melodien, vom Impressionismus zur Rio-Saudade, im Trio Stimme-Gitarre-Akkordeon.", "proj_thelonious_title": "Thelonious Verse", "proj_thelonious_tag": "Vocalese · Thelonious Monk", "proj_thelonious_desc": "Ein Musikabend über das Werk von Thelonious Monk, im Duo Stimme-Klavier mit Maryline Ferrero.", "proj_vedettes_title": "Swing Vedettes", "proj_vedettes_tag": "Swing · Gypsy-Jazz · Chanson", "proj_vedettes_desc": "Ein Quartett um Maud Revol, das amerikanische Jazzstandards und französisches Chanson
